<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHAHAHHAHAHAH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            margin: 0;
            overflow: hidden;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen relative w-full h-full">

    <img src="assets/icarus.png" onerror="this.onerror=null; this.src='https://placehold.co/120x60/ffffff/eab308?text=Icarus'" alt="Icarus" class="absolute top-6 left-6 h-12 md:h-16 object-contain pointer-events-none z-20">
    
    <img src="assets/imzatalhaozturk.png" onerror="this.onerror=null; this.src='https://placehold.co/120x60/ffffff/eab308?text=Imza'" alt="İmza" class="absolute top-6 right-6 h-12 md:h-16 object-contain pointer-events-none z-20">

    <main class="relative z-10 flex flex-col items-center">
        
        <div id="target-container" class="relative group cursor-crosshair">
            <img 
                id="target-image" 
                src="assets/icarus_orkun_gulec_fotograf.png" 
                onerror="this.onerror=null; this.src='https://placehold.co/400x500/f3f4f6/9ca3af?text=Orkun+G%C3%BCle%C3%A7'" 
                alt="Orkun Güleç" 
                class="w-64 sm:w-80 h-auto object-cover select-none pointer-events-none"
            >
        </div>

        <div class="mt-12 text-center">
            <button 
                id="throw-btn" 
                class="bg-transparent border border-yellow-500 text-yellow-500 font-light py-3 px-8 text-xl md:text-2xl uppercase tracking-widest select-none outline-none hover:bg-yellow-50 focus:ring-2 focus:ring-yellow-200"
            >
                Yuhlamak İçin Tıklayın
            </button>
        </div>
    </main>

    <script>
        const throwBtn = document.getElementById('throw-btn');
        const targetImage = document.getElementById('target-image');
        const targetContainer = document.getElementById('target-container');

        throwBtn.addEventListener('click', () => {
            throwTomato();
        });

        targetContainer.addEventListener('click', (e) => {
            throwTomato(e.clientX, e.clientY);
        });

        function throwTomato(clickX = null, clickY = null) {
            const targetRect = targetImage.getBoundingClientRect();
            let hitX, hitY;

            if (clickX !== null && clickY !== null) {
                hitX = clickX;
                hitY = clickY;
            } else {
                const padding = 20;
                const randomX = padding + Math.random() * (targetRect.width - padding * 2);
                const randomY = padding + Math.random() * (targetRect.height - padding * 2);
                
                hitX = targetRect.left + randomX;
                hitY = targetRect.top + randomY;
            }

            const tomato = document.createElement('img');
            tomato.src = 'assets/domates.png';
            
            tomato.onerror = () => {
                tomato.onerror = null;
                const svgEmoji = encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🍅</text></svg>`);
                tomato.src = `data:image/svg+xml;utf8,${svgEmoji}`;
            };
            
            tomato.className = 'absolute z-50 pointer-events-none';
            tomato.style.width = '60px';
            tomato.style.height = '60px';
            tomato.style.left = (hitX - 30) + 'px';
            tomato.style.top = (hitY - 30) + 'px';
            
            document.body.appendChild(tomato);

            setTimeout(() => {
                tomato.remove();
            }, 2000);
        }
    </script>
</body>
</html>
