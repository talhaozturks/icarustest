<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gizli Mesaj</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fdfbf7; /* Hafif sarımsı kağıt rengi */
            --line-color: #333; /* Siyah çizgiler */
            --ink-color: #1a1a1a; /* Koyu mürekkep rengi */
            --highlight-color: #ffb7b2; /* Pembe kurdele rengi */
        }

        body {
            background-color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Caveat', cursive; /* Dağınık el yazısı fontu */
            overflow: hidden;
        }

        .notebook-page {
            background-color: var(--bg-color);
            width: 90vw;
            max-width: 400px;
            height: 300px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15), 0 2px 5px rgba(0,0,0,0.1);
            border-radius: 4px;
            /* Defter çizgileri oluşturma */
            background-image: 
                linear-gradient(transparent 95%, var(--line-color) 95%),
                linear-gradient(transparent 95%, var(--line-color) 95%);
            background-size: 100% 40px;
            padding-top: 40px; /* İlk çizgiden önce boşluk */
            transform: rotate(-2deg); /* Hafif yamuk duruş */
            transition: transform 0.3s ease;
        }
        
        .notebook-page:hover {
            transform: rotate(-1deg) scale(1.02);
        }

        /* Sol taraftaki kırmızı dikey çizgi (opsiyonel ama defter hissini artırır) */
        .notebook-page::before {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            left: 40px;
            width: 2px;
            background-color: rgba(255, 0, 0, 0.3);
            z-index: 1;
        }

        .text-container {
            position: relative;
            z-index: 2;
            padding-left: 60px; /* Kırmızı çizgiyi geçmesi için */
            padding-right: 20px;
            padding-top: 5px;
            font-size: 2.5rem;
            color: var(--ink-color);
            line-height: 40px; /* Çizgi aralığıyla aynı olmalı */
            letter-spacing: 1px;
            transform: rotate(1deg); /* Yazı da biraz yamuk */
        }

        .hidden-word {
            display: inline-block;
            position: relative;
            cursor: pointer;
            padding: 0 5px;
            white-space: nowrap;
        }

        .hidden-word span {
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .hidden-word.revealed span {
            opacity: 1;
        }

        .ribbon-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 120%;
            z-index: 3;
            transition: opacity 0.4s ease, transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            pointer-events: none; /* SVG'nin tıklamayı engellememesi için */
        }

        /* Kurdele çizimi için SVG stili */
        .ribbon-svg {
            width: 100%;
            height: 100%;
            fill: var(--highlight-color);
            filter: drop-shadow(2px 3px 2px rgba(0,0,0,0.2));
        }

        .hidden-word.revealed .ribbon-wrapper {
            opacity: 0;
            transform: translate(-50%, -50%) scale(1.5);
            pointer-events: none;
        }

        /* Küçük bir mürekkep lekesi detayı */
        .ink-blot {
            position: absolute;
            bottom: 20px;
            right: 30px;
            width: 15px;
            height: 12px;
            background-color: var(--ink-color);
            border-radius: 50% 40% 60% 30%;
            opacity: 0.6;
            filter: blur(1px);
        }

    </style>
</head>
<body>

    <div class="notebook-page">
        <div class="text-container">
            Nisan'ı seviyorum <span class="hidden-word" id="secretWord" onclick="revealSecret()">
                <span>HEMDE ÇOOOK SEVİYORUMMM</span>
                <div class="ribbon-wrapper" id="ribbonWrapper">
                    <!-- Özel çizim kurdele SVG'si -->
                    <svg viewBox="0 0 100 60" class="ribbon-svg" xmlns="http://www.w3.org/2000/svg">
                        <path d="M 50 30 C 30 10, 10 20, 20 40 C 30 60, 45 40, 50 30 C 55 40, 70 60, 80 40 C 90 20, 70 10, 50 30 Z" />
                        <path d="M 45 35 L 20 55 C 15 60, 10 50, 15 45 L 40 30 Z" fill="#e6a5a0"/>
                        <path d="M 55 35 L 80 55 C 85 60, 90 50, 85 45 L 60 30 Z" fill="#e6a5a0"/>
                        <circle cx="50" cy="30" r="6" fill="#cc8e88" />
                    </svg>
                </div>
            </span>
        </div>
        <div class="ink-blot"></div>
    </div>

    <script>
        function revealSecret() {
            const wordContainer = document.getElementById('secretWord');
            // Eğer zaten açılmışsa bir şey yapma
            if (!wordContainer.classList.contains('revealed')) {
                wordContainer.classList.add('revealed');
            }
        }
    </script>
</body>
</html>
