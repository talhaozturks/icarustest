<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Icarus MUN 2026 | Ana Sayfa</title>
    
    <link rel="icon" type="image/png" href="assets/icarus.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { gold: '#D4AF37' } } }
        }
    </script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Great+Vibes&display=swap');

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: auto;
        }

        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 0.5s ease, color 0.5s ease;
            -webkit-tap-highlight-color: transparent;
        }

        body.modal-open {
            overflow: hidden !important;
        }

        .font-serif {
            font-family: 'Playfair Display', serif;
        }

        .font-signature {
            font-family: 'Great Vibes', cursive;
        }

        .bg-grid-pattern {
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, rgba(212, 175, 55, 0.08) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(212, 175, 55, 0.08) 1px, transparent 1px);
            background-position: center center;
        }

        .line-draw { position: relative; }
        .line-draw::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0%;
            height: 1px;
            background-color: #D4AF37;
            transition: width 0.3s ease-in-out;
        }
        .line-draw:hover::after { width: 100%; }

        .fade-in { animation: fadeIn 0.4s ease-out forwards; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 4px; }

        html.dark body { background-color: #020617; color: #f8fafc; }
        html.light body { background-color: #f8fafc; color: #1e293b; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-200">
    <div id="root"></div>

        const { useState, useEffect, useRef } = React;

        const localeData = {

                aboutMissionTitle: "OUR MISSION",
                aboutMissionText: "We started Icarus MUN with a simple idea: to create a space where young minds can actually feel the weight of global decisions. It's not just about wearing suits and making speeches for us. It's about stepping into the shoes of world leaders, understanding complex crises from completely different perspectives, and realizing that your voice can truly make a difference.",

                delegNote: "A minimum of 4 people is required for delegation.",
                applyBtn: "APPLY",
                committees: [
                    { 
                        id: 'nato', 
                        desc: "Navigate the complex geopolitical implications of Türkiye's defense choices.",
                        details: "The security environment in today’s world presents new challenges to NATO. As geopolitical tensions escalate and missile technology advances, Turkey’s role in the alliance has become critical. Delegates will engage in crucial discussions on collective defense, regional stability, and alliance solidarity to find effective solutions."
                    },
                    { 
                        id: 'fjcc', 
                        desc: "Draft strategies in a war-torn world of elemental bending.",
                        details: "The world is not balanced. A century of war has turned nations into weapons. This FJCC throws you directly into the chaos of the Hundred Year War. You are an active player inside a war still escalating. Hard power matters, but so does manipulation and timing. This is about power, survival, and what you’re willing to sacrifice to win."
                    },
                    {

                        desc: "A brutal dance of dragons and political machinations.",

                    },
                    {

                    },
                    {

                    },
                    {

                    },
                    {

                        details: "Following decades of conflict, UNTAC was established to restore peace and rebuild a nation. Mandated to maintain security and oversee key aspects of governance, it played a crucial role in guiding Cambodia through a delicate transition period, marking a historic step toward representative governance."
                    },
                    { 
                        id: 'disec', 
                        desc: "Formulate disarmament strategies to address escalating armed conflicts.",
                        details: "The Horn of Africa remains a key item on the international agenda due to its multi-layered crises and geopolitical tensions. This committee will comprehensively address the global implications of the region’s conflicts, humanitarian situation, and security dynamics, aiming to formulate robust disarmament strategies."
                    },
                    { 
                        id: 'unhrc', 
                        desc: "Analyze human rights violations and draft resolutions for sustainable peace.",
                        details: "This committee addresses the humanitarian dimension of the Israel-Palestine conflict. Discussions will center around the implementation of international humanitarian law, access to aid, protection of essential infrastructure, and accountability for violations. Delegates must propose practical solutions to safeguard civilian lives."
                    }

        };

        const staticAssets = {
            nato: "assets/icarus_nato.png",
            fjcc: "assets/icarus_f-jcc.png",
            jcc: "assets/icarus_jcc.png",
            hjcc: "assets/icarus_h-jcc.png",
            hcc: "assets/icarus_hcc.png",
            senate: "assets/icarus_us_senate.png",

            ],
            disec: [
                { image: "assets/icarus_disec_under-secretary_oguz-kaan-baykal.png" },
                { image: "assets/icarus_disec_academic-assistant_ulas-koca.png" }
            ],
            unhrc: [
                { image: "assets/icarus_unhrc_under-secretary-academic-assistant-sinem-sen-berranur-aydogdu.png" }
            ]
        };

        const AtaturkPopup = ({ isOpen, onClose }) => {
            useEffect(() => {
                document.body.classList.toggle('modal-open', isOpen);
            }, [isOpen]);

            if (!isOpen) return null;

            return ReactDOM.createPortal(
                <div className="fixed inset-0 z-[99999] flex items-center justify-center px-4 fade-in bg-slate-950/80 backdrop-blur-sm">
                    <div className="absolute inset-0 cursor-pointer" onClick={onClose} />
                    
                    <div className="relative z-10 w-full max-w-3xl min-h-[350px] sm:min-h-[400px] md:min-h-[500px] bg-white dark:bg-slate-950 border border-gold/40 rounded-xl shadow-xl overflow-hidden flex flex-col items-center justify-center p-6 sm:p-8">
                        
                        <button onClick={onClose} className="absolute top-4 right-4 p-2 z-50 rounded-full bg-slate-100/50 dark:bg-slate-900/50 text-slate-500 hover:text-gold transition-colors">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6 6 18" /><path d="m6 6 12 12" /></svg>
                        </button>

                        {/* Atatürk Görseli Sol Alt - Mobilde watermark efekti, masaüstünde net */}
                        <img 
                            src="assets/ataturk.png" 
                            alt="Mustafa Kemal Atatürk" 
                            className="absolute bottom-0 left-0 w-32 sm:w-48 md:w-64 lg:w-72 h-auto object-contain pointer-events-none opacity-20 sm:opacity-90 dark:opacity-10 dark:sm:opacity-80"
                            onError={(e) => { e.target.style.display='none'; }}
                        />

                        {/* Merkezdeki Söz - Mobilde tam orta, masaüstünde sağa yaslı */}
                        <div className="relative z-10 flex flex-col items-center text-center w-full pl-0 sm:pl-40 md:pl-56">
                            <svg className="w-8 h-8 sm:w-10 sm:h-10 md:w-12 md:h-12 text-gold/30 mb-4 sm:mb-6" fill="currentColor" viewBox="0 0 24 24"><path d="M14.017 21v-7.391c0-5.704 3.731-9.57 8.983-10.609l.995 2.151c-2.432.917-3.995 3.638-3.995 5.849h4v10h-9.983zm-14.017 0v-7.391c0-5.704 3.748-9.57 9-10.609l.996 2.151c-2.433.917-3.996 3.638-3.996 5.849h3.983v10h-9.983z" /></svg>
                            <h2 className="text-4xl sm:text-5xl md:text-6xl lg:text-7xl font-signature text-slate-900 dark:text-white leading-tight mb-4 sm:mb-8">

        const CommitteeModal = ({ committee, onClose }) => {
            useEffect(() => {
                document.body.classList.toggle('modal-open', !!committee);
                return () => document.body.classList.remove('modal-open');
            }, [committee]);

            if (!committee) return null;
            const staffList = rosterData[committee.id] || [];
            
            return ReactDOM.createPortal(
                <div className="fixed inset-0 z-[99999] flex items-center justify-center px-4 fade-in bg-slate-950/80 backdrop-blur-sm">
                    <div className="absolute inset-0 cursor-pointer" onClick={onClose} />
                    
                    <div className="relative z-10 flex flex-col w-full max-w-5xl h-[85vh] sm:h-[80vh] bg-slate-50 dark:bg-slate-950 border border-gold/40 rounded-xl overflow-hidden shadow-xl">
                        
                        <div className="absolute inset-0 z-0 bg-slate-100 dark:bg-slate-900 pointer-events-none" />

                        <button onClick={onClose} className="absolute top-4 right-4 p-2 z-50 rounded-full bg-white/50 dark:bg-slate-800/50 text-slate-500 hover:text-gold transition-colors">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6 6 18" /><path d="m6 6 12 12" /></svg>
                        </button>

                        <div className="relative z-10 flex flex-col p-6 md:p-10 lg:p-12 h-full overflow-y-auto">
                            
                            <div className="flex flex-col md:flex-row items-center md:items-start gap-6 md:gap-10 w-full shrink-0">
                                <div className="w-full md:w-1/3 flex justify-center md:justify-start shrink-0">
                                    <img src={staticAssets[committee.id]} alt="Committee Logo" className="w-40 sm:w-56 md:w-full max-w-[280px] object-contain" onError={(e) => { e.target.src='assets/icarus.png'; }} />
                                </div>

                                <div className="w-full md:w-2/3 flex flex-col text-center md:text-left justify-center min-h-[120px]">
                                    <p className="text-sm sm:text-base md:text-lg text-slate-700 dark:text-slate-300 leading-relaxed font-light">

                                </div>

                                        <img src={staff.image} alt="Staff" className="w-full h-auto object-contain" onError={(e) => { e.target.src='assets/icarus.png'; }} />

                                ))}

                        </div>
                    </div>
                </div>,
                document.body
            );
        };

        const Loader = ({ onComplete }) => {
            const [progress, setProgress] = useState(0);

            useEffect(() => {
                const step = 100 / (3500 / 50);
                const timer = setInterval(() => {
                    setProgress(p => (p >= 100 ? 100 : p + step));
                }, 50);
                
                const timeout = setTimeout(onComplete, 3500);
                
                return () => {
                    clearInterval(timer);
                    clearTimeout(timeout);
                };
            }, [onComplete]);

            return (
                <div className="fixed inset-0 z-50 flex flex-col items-center justify-center bg-slate-100 dark:bg-slate-950">
                    <div className="relative z-10 w-full max-w-md px-6 flex flex-col items-center fade-in">
                        
                        <div className="relative flex items-center justify-center mb-12">
                            <img src="assets/icarusarkaplansiz.png" alt="Icarus Logo" className="z-10 w-32 h-auto" onError={(e) => { e.target.style.display='none'; }} />
                        </div>
                        
                        <div className="w-full h-[2px] mb-6 bg-slate-300 dark:bg-slate-800 relative overflow-hidden rounded-full">
                            <div className="h-full bg-gold" style={{ width: `${progress}%`, transition: 'width 75ms ease-out' }} />
                        </div>
                        
                        <div className="mt-4 flex justify-center w-full opacity-80">
                            <img src="assets/imzatalhaozturk.png" alt="Signature" className="h-28 sm:h-44 md:h-48 w-auto object-contain" onError={(e) => { e.target.style.display='none'; }} />
                        </div>
                    </div>
                </div>
            );
        };

        const Countdown = ({ label }) => {
            const [time, setTime] = useState({ d: 0, h: 0, m: 0, s: 0 });

            useEffect(() => {
                const target = new Date("2026-09-04T00:00:00").getTime();
                const timer = setInterval(() => {
                    const diff = target - Date.now();
                    if (diff > 0) {
                        setTime({
                            d: Math.floor(diff / (1000 * 60 * 60 * 24)),
                            h: Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)),
                            m: Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)),
                            s: Math.floor((diff % (1000 * 60)) / 1000)
                        });
                    } else clearInterval(timer);
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            return (
                <div className="flex flex-col items-center lg:items-start mt-8 sm:mt-12 w-full">
                    <div className="mb-4 text-[10px] tracking-widest uppercase font-mono text-slate-500 dark:text-slate-400">{label}</div>
                    <div className="flex gap-4 md:gap-8 justify-center lg:justify-start flex-wrap">

                                <span className="mt-2 text-[10px] uppercase font-mono text-slate-500">{u}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const ContactModal = ({ isOpen, onClose, data }) => {
            useEffect(() => {
                document.body.classList.toggle('modal-open', isOpen);
                return () => document.body.classList.remove('modal-open');
            }, [isOpen]);

            if (!isOpen) return null;

            const mailSubject = "IcarusMUN Bilgi Talebi";
            const mailBody = "Hello, I would like to get information about...";
            const mailtoLink = `mailto:icarusmun.information@gmail.com?subject=${encodeURIComponent(mailSubject)}&body=${encodeURIComponent(mailBody)}`;

            return ReactDOM.createPortal(
                <div className="fixed inset-0 z-[99999] flex items-center justify-center px-4 fade-in bg-slate-950/80 backdrop-blur-sm">
                    <div className="absolute inset-0 cursor-pointer" onClick={onClose} />
                    <div className="relative z-10 flex flex-col items-center w-full max-w-md p-8 sm:p-12 overflow-hidden shadow-xl bg-white dark:bg-slate-950 border border-gold/40 rounded-xl">
                        <button onClick={onClose} className="absolute top-4 right-4 p-2 rounded-full bg-slate-100/50 dark:bg-slate-900/50 text-slate-500 hover:text-gold transition-colors">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6 6 18" /><path d="m6 6 12 12" /></svg>
                        </button>
                        
                        <div className="p-4 mb-4 rounded-full shadow-sm text-gold bg-slate-50 dark:bg-slate-900 border border-gold/30">

                        </div>

                        <div className="w-16 h-[1px] bg-gold mb-6" />
                        <p className="mb-2 text-xs tracking-widest font-mono text-slate-500 dark:text-slate-400">{data.contactEmail}</p>
                        <p className="mb-8 text-sm sm:text-base font-semibold text-slate-800 dark:text-slate-200 break-all">icarusmun.information@gmail.com</p>

                        <a href={mailtoLink} className="w-full text-center px-6 py-4 text-xs tracking-widest transition-all duration-300 shadow-sm sm:text-sm font-mono border text-gold border-gold bg-gold/10 hover:bg-gold hover:text-white dark:hover:text-slate-950">
                            {data.contactBtn}
                        </a>
                    </div>
                </div>,
                document.body
            );
        };

        const ApplyModal = ({ isOpen, onClose, t }) => {
            useEffect(() => {
                document.body.classList.toggle('modal-open', isOpen);
                return () => document.body.classList.remove('modal-open');
            }, [isOpen]);

            if (!isOpen) return null;

            return ReactDOM.createPortal(
                <div className="fixed inset-0 z-[99999] flex items-center justify-center px-4 fade-in bg-slate-950/80 backdrop-blur-sm">
                    <div className="absolute inset-0 cursor-pointer" onClick={onClose} />
                    <div className="relative z-10 w-full max-w-5xl bg-white dark:bg-slate-950 border border-gold/40 rounded-xl shadow-xl overflow-hidden flex flex-col max-h-[90vh]">
                        <div className="flex items-center justify-between p-6 border-b border-gold/20 bg-slate-50/90 dark:bg-slate-900/90">
                            <h2 className="text-2xl md:text-3xl font-serif text-slate-900 dark:text-white">{t.applyModalTitle}</h2>
                            <button onClick={onClose} className="p-2 rounded-full bg-slate-200/50 dark:bg-slate-800/50 text-slate-500 hover:text-gold transition-colors">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6 6 18" /><path d="m6 6 12 12" /></svg>
                            </button>
                        </div>
                        
                        <div className="p-6 md:p-10 overflow-y-auto">
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">

                                    <img src="assets/icarus_delegeler.png" alt={t.indivApply} className="h-20 w-auto object-contain mb-6" onError={(e) => { e.target.style.display='none'; }} />
                                    <h3 className="text-xl font-serif text-slate-900 dark:text-white mb-2">{t.indivApply}</h3>
                                    <p className="text-lg font-mono text-gold mb-6">{t.indivPrice}</p>
                                    <div className="flex-1" />
                                    <a href="https://forms.gle/v9DdMy8icZ1J1XTj8" target="_blank" rel="noopener noreferrer" className="w-full py-3 text-xs tracking-widest font-mono text-white bg-gold hover:bg-gold/80 transition-colors rounded block text-center">{t.applyBtn}</a>
                                </div>

                                <div className="flex flex-col items-center p-8 border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/50 hover:border-gold/50 transition-colors rounded-lg text-center">
                                    <img src="assets/icarus_delegasyon.png" alt={t.delegApply} className="h-20 w-auto object-contain mb-6" onError={(e) => { e.target.style.display='none'; }} />
                                    <h3 className="text-xl font-serif text-slate-900 dark:text-white mb-2">{t.delegApply}</h3>
                                    <p className="text-lg font-mono text-gold mb-2">{t.delegPrice}</p>
                                    <p className="text-[10px] text-slate-500 mb-6 px-2">{t.delegNote}</p>
                                    <div className="flex-1" />
                                    <a href="https://forms.gle/Z9sPWTLnPK39bKr69" target="_blank" rel="noopener noreferrer" className="w-full py-3 text-xs tracking-widest font-mono text-white bg-gold hover:bg-gold/80 transition-colors rounded block text-center">{t.applyBtn}</a>
                                </div>

                                <div className="flex flex-col items-center p-8 border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/50 hover:border-slate-400 dark:hover:border-slate-500 transition-colors rounded-lg text-center">
                                    <img src="assets/icarus_ziyaretci.png" alt={t.visApply} className="h-20 w-auto object-contain mb-6 opacity-85" onError={(e) => { e.target.style.display='none'; }} />
                                    <h3 className="text-xl font-serif text-slate-900 dark:text-white mb-2">{t.visApply}</h3>
                                    <p className="text-lg font-mono text-slate-500 dark:text-slate-400 mb-6">{t.visPrice}</p>
                                    <div className="flex-1" />
                                    <button className="w-full py-3 text-xs tracking-widest font-mono text-slate-700 dark:text-slate-200 border border-slate-300 dark:border-slate-700 hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors rounded">{t.applyBtn}</button>
                                </div>

                            </div>
                        </div>
                    </div>
                </div>,
                document.body
            );
        };

        const AboutView = ({ t }) => (
            <div className="max-w-7xl mx-auto min-h-[90vh] pt-28 pb-16 px-6 fade-in">
                <div className="text-center mb-16">
                    <p className="text-xs font-mono text-gold tracking-[0.3em] mb-2">{t.aboutDesc}</p>
                    <h1 className="text-4xl md:text-5xl font-serif text-slate-900 dark:text-white">{t.aboutTitle}</h1>
                    <div className="w-16 h-[1px] bg-gold mx-auto mt-6" />
                </div>
                
                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-12 max-w-5xl mx-auto">
                    <div className="p-8 md:p-10 border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 rounded-xl shadow-sm hover:border-gold/50 transition-colors group">
                        <div className="mb-6">
                            <h2 className="text-2xl font-serif text-slate-900 dark:text-white">{t.aboutMissionTitle}</h2>
                            <div className="w-12 h-[2px] bg-gold mt-4" />
                        </div>
                        <p className="text-slate-700 dark:text-slate-300 leading-relaxed font-light text-base md:text-lg">
                            {t.aboutMissionText}
                        </p>
                    </div>
                    
                    <div className="p-8 md:p-10 border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 rounded-xl shadow-sm hover:border-gold/50 transition-colors group">
                        <div className="mb-6">
                            <h2 className="text-2xl font-serif text-slate-900 dark:text-white">{t.aboutVisionTitle}</h2>
                            <div className="w-12 h-[2px] bg-gold mt-4" />
                        </div>
                        <p className="text-slate-700 dark:text-slate-300 leading-relaxed font-light text-base md:text-lg">
                            {t.aboutVisionText}
                        </p>
                    </div>
                </div>
            </div>
        );

        const MainApp = ({ lang }) => {
            const t = localeData[lang];
            const [view, setView] = useState('home');
            const [activeCom, setActiveCom] = useState(null);
            const [menuOpen, setMenuOpen] = useState(false);
            const [showAtaturkPopup, setShowAtaturkPopup] = useState(true);
            const [isContactOpen, setIsContactOpen] = useState(false);
            const [isApplyOpen, setIsApplyOpen] = useState(false);

            const handleScrollToCommittees = () => {
                const element = document.getElementById('committees');
                if (element) {
                    element.scrollIntoView({ behavior: 'smooth' });
                }
            };

            return (
                <div className="relative w-full min-h-screen overflow-x-hidden bg-slate-50 dark:bg-slate-950">
                    <nav className="fixed top-0 inset-x-0 z-40 bg-white/95 dark:bg-slate-950/95 border-b border-gold/20">
                        <div className="flex items-center justify-between h-16 md:h-20 max-w-7xl mx-auto px-4 sm:px-6">
                            <div className="flex items-center gap-3 cursor-pointer" onClick={() => setView('home')}>
                                <img src="assets/icarusarkaplansiz.png" alt="Logo" className="h-8 md:h-12" onError={(e) => { e.target.src='assets/icarus.png'; }} />
                                <div className="flex flex-col">
                                    <span className="text-sm md:text-lg font-bold font-serif text-gold tracking-widest">ICARUS</span>
                                    <span className="text-[7px] md:text-[10px] font-mono text-slate-500 tracking-widest">MUN 2026</span>
                                </div>
                            </div>
                            
                            <div className="hidden md:flex gap-8 items-center">
                                <button onClick={() => setView('home')} className={`text-sm uppercase tracking-wide transition line-draw ${view === 'home' ? 'text-gold font-bold' : 'text-slate-600 dark:text-slate-300 hover:text-gold'}`}>{t.nav.home}</button>
                                <button onClick={() => setView('about')} className={`text-sm uppercase tracking-wide transition line-draw ${view === 'about' ? 'text-gold font-bold' : 'text-slate-600 dark:text-slate-300 hover:text-gold'}`}>{t.nav.about}</button>
                                <button onClick={() => window.location.href='/team'} className="text-sm uppercase tracking-wide transition line-draw text-slate-600 dark:text-slate-300 hover:text-gold">{t.nav.team}</button>
                                <button onClick={() => window.location.href='/sponsors'} className="text-sm uppercase tracking-wide transition line-draw text-slate-600 dark:text-slate-300 hover:text-gold">{t.nav.sponsors}</button>
                                <button onClick={() => setIsApplyOpen(true)} className="text-sm uppercase tracking-wide text-slate-600 dark:text-slate-300 hover:text-gold transition line-draw">{t.nav.apply}</button>
                                <button onClick={() => setIsContactOpen(true)} className="p-2 ml-4 rounded-full transition-colors text-slate-500 hover:text-gold dark:text-slate-400 dark:hover:text-gold border border-transparent hover:border-gold/30">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                                </button>
                            </div>

                            <div className="flex items-center gap-2 md:hidden">
                                <button className="p-2 text-slate-500 hover:text-gold dark:text-slate-400 transition-colors" onClick={() => setIsContactOpen(true)}>
                                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                                </button>
                                <button className="p-2 text-gold" onClick={() => setMenuOpen(!menuOpen)}>
                                    {menuOpen ? (
                                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg>
                                    ) : (
                                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" y1="12" x2="20" y2="12" /><line x1="4" y1="6" x2="20" y2="6" /><line x1="4" y1="18" x2="20" y2="18" /></svg>
                                    )}
                                </button>
                            </div>
                        </div>
                    </nav>

                    {menuOpen && (
                        <div className="fixed top-16 left-0 w-full bg-white/95 dark:bg-slate-950/95 z-30 flex flex-col p-4 border-b border-gold/20">
                            <button onClick={() => { setView('home'); setMenuOpen(false); }} className={`py-3 text-left font-medium ${view === 'home' ? 'text-gold' : 'text-slate-800 dark:text-slate-200'}`}>{t.nav.home}</button>
                            <button onClick={() => { setView('about'); setMenuOpen(false); }} className={`py-3 text-left font-medium ${view === 'about' ? 'text-gold' : 'text-slate-800 dark:text-slate-200'}`}>{t.nav.about}</button>
                            <button onClick={() => window.location.href='/team'} className="py-3 text-left font-medium text-slate-800 dark:text-slate-200">{t.nav.team}</button>
                            <button onClick={() => window.location.href='/sponsors'} className="py-3 text-left font-medium text-slate-800 dark:text-slate-200">{t.nav.sponsors}</button>
                            <button onClick={() => { setIsApplyOpen(true); setMenuOpen(false); }} className="py-3 text-left font-medium text-slate-800 dark:text-slate-200">{t.nav.apply}</button>
                        </div>
                    )}

                    {view === 'about' ? (
                        <AboutView t={t} />
                    ) : (
                        <div className="fade-in relative z-10 w-full">
                            <div className="relative flex flex-col items-center justify-center w-full min-h-[90vh] overflow-hidden border-b border-gold/20 bg-slate-50 dark:bg-slate-950">
                                <div className="absolute inset-0 z-0 bg-grid-pattern opacity-50 dark:opacity-20" />
                                <div className="absolute inset-0 z-0 bg-[url('assets/icarusyuklenme2.png')] bg-cover bg-center opacity-30 dark:opacity-20" />

                                <main className="relative z-10 flex flex-col lg:flex-row items-center justify-center w-full max-w-7xl mx-auto px-4 pt-24 pb-16 sm:pt-32 sm:pb-20 sm:px-6 gap-12 lg:gap-16">
                                    <div className="w-full lg:w-1/2 flex flex-col items-center lg:items-start text-center lg:text-left">
                                        <span className="px-3 py-1 mb-4 text-[9px] sm:text-sm tracking-[0.3em] uppercase rounded-none sm:mb-6 font-mono text-gold border border-gold/30 bg-gold/10">
                                            {t.heroSubtitle}
                                        </span>
                                        <h1 className="mb-4 text-3xl font-bold tracking-tight leading-tight sm:text-5xl md:text-6xl lg:text-7xl sm:mb-8 font-serif text-slate-900 dark:text-white max-w-2xl">
                                            {t.heroTitle}
                                        </h1>
                                        
                                        <p className="max-w-2xl mb-8 text-xs font-light leading-relaxed sm:text-sm md:text-base sm:mb-12 text-slate-700 dark:text-slate-400">
                                            Represent your country, defend your ideas, and challenge perspectives in a high-energy Model United Nations experience built for the next generation of decision makers.<br/> No limits. Just voices that shape the world.<br/><strong className="font-bold text-gold text-sm sm:text-lg mt-2 inline-block">Are you ready to rise?</strong>
                                        </p>

                                        <div className="flex flex-col sm:flex-row justify-center lg:justify-start w-full max-w-md sm:max-w-none gap-4 sm:gap-6">
                                            <div className="w-full sm:w-auto">
                                                <button onClick={() => setIsApplyOpen(true)} className="relative w-full px-8 py-4 text-xs tracking-widest transition-all duration-300 shadow-sm group sm:text-sm font-mono border text-white border-gold bg-gold hover:bg-gold/80 overflow-hidden">
                                                    <span className="relative z-10">{t.singleApplyBtn}</span>
                                                </button>
                                            </div>
                                            <div className="w-full sm:w-auto mt-4 sm:mt-0">
                                                <button onClick={handleScrollToCommittees} className="w-full h-full px-8 py-4 text-xs tracking-widest transition-all duration-300 shadow-sm sm:text-sm font-mono border text-slate-700 border-slate-400 bg-white/80 hover:border-gold/50 hover:text-gold dark:bg-slate-900/50 dark:border-slate-700 dark:text-slate-300 dark:hover:text-gold">
                                                    {t.ctaCommittees}
                                                </button>
                                            </div>
                                        </div>
                                        <Countdown label={t.countdownText} />
                                    </div>
                                </main>
                            </div>

                            <section className="relative py-12 overflow-hidden sm:py-24 border-t border-slate-300 dark:border-slate-800 bg-[url('assets/icarusyuklenme2.png')] bg-cover bg-center bg-no-repeat">
                                <div className="absolute inset-0 bg-slate-100/90 dark:bg-slate-950/90" />
                                <div className="relative z-10 flex flex-col items-center max-w-7xl mx-auto px-4 sm:px-6">
                                    <h2 className="flex items-center justify-center w-full gap-3 mb-6 text-2xl text-center sm:text-3xl md:text-4xl sm:gap-4 sm:mb-8 font-serif text-slate-900 dark:text-slate-100">
                                        <img src="assets/Istanbul_Aydın_University_logo.svg.png" alt="İAÜ Logo" className="w-auto h-8 object-contain sm:h-12 md:h-14" onError={(e) => { e.target.style.display='none'; }} />
                                        <span>İstanbul Aydın Üniversitesi</span>
                                    </h2>
                                    
                                    <div className="relative w-full mb-6 overflow-hidden rounded shadow-sm aspect-square sm:aspect-[16/9] md:aspect-[21/9] border border-gold/30">
                                        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3011.587133725575!2d28.79458617655148!3d40.99052062051735!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x14caa396db59606d%3A0x6594147beb14e9b4!2zxLBzdGFuYnVsIEF5ZMSxbiDDnG5pdmVyc2l0ZXNp!5e0!3m2!1str!2str!4v1779138319153!5m2!1str!2str" className="absolute top-0 left-0 w-full h-full" style={{border:0}} allowFullScreen={true} loading="lazy" referrerPolicy="no-referrer-when-downgrade" />
                                    </div>
                                    
                                    <div className="flex flex-col justify-center w-full max-w-2xl gap-3 sm:flex-row sm:gap-4">
                                        <a href="https://maps.google.com/?q=İstanbul+Aydın+Üniversitesi" target="_blank" rel="noopener noreferrer" className="flex-1 px-4 py-3 text-center text-[10px] tracking-widest transition-all duration-300 shadow-sm sm:py-4 sm:text-xs font-mono border text-slate-700 border-slate-300 bg-white hover:border-gold/50 hover:text-gold dark:bg-slate-900/50 dark:border-slate-700 dark:text-slate-300 dark:hover:text-gold">
                                            {t.mapGoogle}
                                        </a>
                                        <a href="http://maps.apple.com/?q=İstanbul+Aydın+Üniversitesi" target="_blank" rel="noopener noreferrer" className="flex-1 px-4 py-3 text-center text-[10px] tracking-widest transition-all duration-300 shadow-sm sm:py-4 sm:text-xs font-mono border text-slate-700 border-slate-300 bg-white hover:border-gold/50 hover:text-gold dark:bg-slate-900/50 dark:border-slate-700 dark:text-slate-300 dark:hover:text-gold">
                                            {t.mapApple}
                                        </a>
                                    </div>
                                </div>
                            </section>

                            <section id="committees" className="py-20 bg-slate-100/50 dark:bg-slate-900/20 border-t border-slate-200 dark:border-slate-800">
                                <div className="max-w-6xl mx-auto px-6">
                                    <div className="text-center mb-12">
                                        <h2 className="text-3xl md:text-4xl font-serif text-slate-900 dark:text-white mb-2">{t.committeesTitle}</h2>
                                        <div className="w-16 h-[1px] bg-gold mx-auto" />
                                    </div>

                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                        {t.committees.map((com, i) => (
                                            <div key={i} onClick={() => setActiveCom(com)} className="flex flex-col sm:flex-row items-center p-6 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 cursor-pointer hover:border-gold/50 transition-colors">
                                                <div className="w-full sm:w-2/5 pr-0 sm:pr-4 flex justify-center mb-4 sm:mb-0 shrink-0">
                                                    <img src={staticAssets[com.id]} className="w-full max-w-[160px] object-contain" onError={(e) => { e.target.src='assets/icarus.png'; }} />
                                                </div>
                                                <div className="w-full sm:w-3/5 sm:border-l border-slate-200 dark:border-slate-800 sm:pl-6 flex flex-col justify-between h-full">
                                                    <p className="text-sm text-slate-600 dark:text-slate-400 text-center sm:text-left">{com.desc}</p>
                                                    <span className="text-[10px] text-gold font-mono mt-4 uppercase text-center sm:text-left">{t.clickInfo} &rarr;</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </section>
                        </div>
                    )}

                    <footer className="py-10 flex flex-col justify-center items-center gap-5 bg-white dark:bg-slate-950 border-t border-slate-200 dark:border-slate-800">
                        <img src="assets/imzatalhaozturk.png" alt="Signature" className="h-24 sm:h-32 md:h-40 w-auto object-contain opacity-80" onError={(e) => { e.target.style.display='none'; }} />
                        <p className="text-[10px] md:text-xs font-mono text-slate-500 tracking-widest uppercase">{t.footer}</p>
                    </footer>

                    <AtaturkPopup isOpen={showAtaturkPopup} onClose={() => setShowAtaturkPopup(false)} />
                    <ContactModal isOpen={isContactOpen} onClose={() => setIsContactOpen(false)} data={t} />
                    <ApplyModal isOpen={isApplyOpen} onClose={() => setIsApplyOpen(false)} t={t} />
                    {activeCom && <CommitteeModal committee={activeCom} onClose={() => setActiveCom(null)} />}
                </div>
            );
        };

        const MainRoot = () => {
            const [stage, setStage] = useState(() => {
                let skipLoader = false;
                try {
                    if (document.referrer) {
                        const refUrl = new URL(document.referrer);
                        if (refUrl.hostname === window.location.hostname) {
                            const path = refUrl.pathname.toLowerCase();
                            if (path.includes('team') || path.includes('sponsors') || path.includes('kadromuz')) {
                                skipLoader = true;
                            }
                        }
                    }
                } catch (e) {
                    console.error("Referrer parse error", e);
                }
                return skipLoader ? 'MAIN' : 'LOADING';
            });
            const [dark, setDark] = useState(false);

            useEffect(() => {
                document.documentElement.classList.toggle('dark', dark);
                document.documentElement.classList.toggle('light', !dark);
            }, [dark]);

            const handleLoaderComplete = () => {
                setStage('MAIN');
            };

            return (
                <>
                    {stage === 'LOADING' && <Loader onComplete={handleLoaderComplete} />}
                    {stage === 'MAIN' && <MainApp lang="en" />}

                    {stage !== 'LOADING' && (
                        <button onClick={() => setDark(!dark)} className="fixed bottom-6 right-6 p-4 rounded-full shadow-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 z-[999]">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="text-slate-600 dark:text-gold">
                                <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
                            </svg>
                        </button>
                    )}
                </>
            );
        };

        const rootNode = document.getElementById('root');
        ReactDOM.createRoot(rootNode).render(<MainRoot />);
    </script>
</body>
</html>
