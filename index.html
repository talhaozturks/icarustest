        html, body {

            padding: 0;
            width: 100%;
            height: auto;
        }

        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 0.5s ease, color 0.5s ease;

        }

        body.modal-open {

        }

        .font-serif {
            font-family: 'Playfair Display', serif;
        }

        .font-signature {

        }

        .bg-grid-pattern {
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, rgba(212, 175, 55, 0.08) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(212, 175, 55, 0.08) 1px, transparent 1px);
            background-position: center center;
        }

        .line-draw { position: relative; }
        .line-draw::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0%;
            height: 1px;
            background-color: #D4AF37;
            transition: width 0.3s ease-in-out;
        }
        .line-draw:hover::after { width: 100%; }

        .fade-in { animation: fadeIn 0.4s ease-out forwards; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 4px; }

        html.dark body { background-color: #020617; color: #f8fafc; }
        html.light body { background-color: #f8fafc; color: #1e293b; }
        
        .globe-scroll { animation: scrollGlobe 25s linear infinite; }
        @keyframes scrollGlobe {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); } 
        }

        .map-bg-scroll { animation: scrollMapBg 60s linear infinite; }

            from { transform: translateX(0); }
            to { transform: translateX(-50%); }

                            </div>
                            
                            <div className="hidden md:flex gap-8 items-center">
                                <button onClick={() => setView('home')} className={`text-sm uppercase tracking-wide transition line-draw ${view === 'home' ? 'text-gold' : 'text-slate-600 dark:text-slate-300 hover:text-gold'}`}>{t.nav.home}</button>
                                <button onClick={() => setView('team')} className={`text-sm uppercase tracking-wide transition line-draw ${view === 'team' ? 'text-gold' : 'text-slate-600 dark:text-slate-300 hover:text-gold'}`}>{t.nav.team}</button>
                                <button onClick={() => setView('sponsors')} className={`text-sm uppercase tracking-wide transition line-draw ${view === 'sponsors' ? 'text-gold' : 'text-slate-600 dark:text-slate-300 hover:text-gold'}`}>{t.nav.sponsors}</button>
                                <button onClick={() => setView('forum')} className={`text-sm uppercase tracking-wide transition line-draw ${view === 'forum' ? 'text-gold font-bold' : 'text-slate-600 dark:text-slate-300 hover:text-gold'}`}>{t.nav.forum}</button>
                                <button onClick={() => setIsApplyOpen(true)} className="text-sm uppercase tracking-wide text-slate-600 dark:text-slate-300 hover:text-gold transition line-draw">{t.nav.apply}</button>
                                <button onClick={() => setIsContactOpen(true)} className="p-2 ml-4 rounded-full transition-colors text-slate-500 hover:text-gold dark:text-slate-400 dark:hover:text-gold border border-transparent hover:border-gold/30">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                                </button>
                            </div>

                            <div className="flex items-center gap-2 md:hidden">
                                <button className="p-2 text-slate-500 hover:text-gold dark:text-slate-400 transition-colors" onClick={() => setIsContactOpen(true)}>
                                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                                </button>
                                <button className="p-2 text-gold" onClick={() => setMenuOpen(!menuOpen)}>
                                    {menuOpen ? (
                                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg>
                                    ) : (
                                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="4" x2="20" y1="12" y2="12" /><line x1="4" x2="20" y1="6" x2="6" /><line x1="4" x2="20" y1="18" y2="18" /></svg>
                                    )}
                                </button>
                            </div>
                        </div>
                    </nav>

                    {menuOpen && (
                        <div className="fixed top-16 left-0 w-full bg-white/95 dark:bg-slate-950/95 z-30 flex flex-col p-4 border-b border-gold/20 backdrop-blur-md">
                            <button onClick={() => { setView('home'); setMenuOpen(false); }} className={`py-3 text-left font-medium ${view === 'home' ? 'text-gold' : 'text-slate-800 dark:text-slate-200'}`}>{t.nav.home}</button>
                            <button onClick={() => { setView('team'); setMenuOpen(false); }} className={`py-3 text-left font-medium ${view === 'team' ? 'text-gold' : 'text-slate-800 dark:text-slate-200'}`}>{t.nav.team}</button>
                            <button onClick={() => { setView('sponsors'); setMenuOpen(false); }} className={`py-3 text-left font-medium ${view === 'sponsors' ? 'text-gold' : 'text-slate-800 dark:text-slate-200'}`}>{t.nav.sponsors}</button>
                            <button onClick={() => { setView('forum'); setMenuOpen(false); }} className={`py-3 text-left font-medium ${view === 'forum' ? 'text-gold' : 'text-slate-800 dark:text-slate-200'}`}>{t.nav.forum}</button>
                            <button onClick={() => { setIsApplyOpen(true); setMenuOpen(false); }} className="py-3 text-left font-medium text-slate-800 dark:text-slate-200">{t.nav.apply}</button>
                        </div>
                    )}

                    {view === 'team' ? (
                        <TeamSection data={t} />
                    ) : view === 'sponsors' ? (
                        <SponsorsView t={t} />
                    ) : view === 'forum' ? (
                        <ForumView t={t} />
                    ) : (
                        <div className="fade-in relative z-10 w-full">
                            <div className="relative flex flex-col items-center justify-center w-full min-h-[90vh] overflow-hidden border-b border-gold/20">
                                <div className="absolute inset-0 z-0 bg-[url('assets/icarusyuklenme2.png')] bg-cover bg-center opacity-30 dark:opacity-20" />
                                <AnimatedMap />

                                <main className="relative z-10 flex flex-col lg:flex-row items-center justify-center w-full max-w-7xl mx-auto px-4 pt-24 pb-16 sm:pt-32 sm:pb-20 sm:px-6 gap-12 lg:gap-16">
                                    <div className="w-full lg:w-1/2 flex flex-col items-center lg:items-start text-center lg:text-left">
                                        <span className="px-3 py-1 mb-4 text-[9px] sm:text-sm tracking-[0.3em] uppercase rounded-none backdrop-blur-sm sm:mb-6 font-mono text-gold border border-gold/30 bg-gold/10">
                                            {t.heroSubtitle}
                                        </span>
                                        <h1 className="mb-4 text-3xl font-bold tracking-tight leading-tight transition-colors sm:text-5xl md:text-6xl lg:text-7xl sm:mb-8 font-serif text-slate-900 dark:text-white drop-shadow-sm max-w-2xl">
                                            {t.heroTitle}
                                        </h1>
                                        
                                        <p className="max-w-2xl mb-8 text-xs font-light leading-relaxed sm:text-sm md:text-base sm:mb-12 text-slate-700 dark:text-slate-400">
                                            {lang === 'en' ? (
                                                <>Represent your country, defend your ideas, and challenge perspectives in a high-energy Model United Nations experience built for the next generation of decision makers.<br/> No limits. Just voices that shape the world.<br/><strong className="font-bold text-gold text-sm sm:text-lg mt-2 inline-block">Are you ready to rise?</strong></>
                                            ) : (
                                                <>Ülkenizi temsil edin, fikirlerinizi savunun ve yeni nesil karar alıcılar için tasarlanmış yüksek enerjili bir Model Birleşmiş Milletler deneyiminde bakış açılarına meydan okuyun.<br/> Sınır yok. Sadece dünyayı şekillendiren sesler var.<br/><strong className="font-bold text-gold text-sm sm:text-lg mt-2 inline-block">Yükselmeye hazır mısınız?</strong></>
                                            )}
                                        </p>

                                        <div className="flex flex-col sm:flex-row justify-center lg:justify-start w-full max-w-md sm:max-w-none gap-4 sm:gap-6">
                                            <div className="w-full sm:w-auto">
                                                <button onClick={() => setIsApplyOpen(true)} className="relative w-full px-8 py-4 text-xs tracking-widest transition-all duration-300 shadow-sm group sm:text-sm font-mono border text-white border-gold bg-gold hover:bg-gold/80 overflow-hidden">
                                                    <span className="relative z-10">{t.singleApplyBtn}</span>
                                                </button>
                                            </div>
                                            <div className="w-full sm:w-auto mt-4 sm:mt-0">
                                                <button onClick={handleScrollToCommittees} className="w-full h-full px-8 py-4 text-xs tracking-widest transition-all duration-300 shadow-sm backdrop-blur-sm hover:shadow-md sm:text-sm font-mono border text-slate-700 border-slate-400 bg-white/80 hover:border-gold/50 hover:text-gold dark:bg-slate-900/50 dark:border-slate-700 dark:text-slate-300 dark:hover:text-gold">
                                                    {t.ctaCommittees}
                                                </button>
                                            </div>
                                        </div>
                                        <Countdown label={t.countdownText} />
                                    </div>
                                </main>
                            </div>

                            <section className="relative py-12 overflow-hidden transition-colors sm:py-24 border-t border-slate-300 dark:border-slate-800 bg-[url('assets/icarusyuklenme2.png')] bg-cover bg-center bg-no-repeat">
                                <div className="absolute inset-0 bg-slate-100/80 dark:bg-slate-950/80 backdrop-blur-[2px]" />
                                <div className="relative z-10 flex flex-col items-center max-w-7xl mx-auto px-4 sm:px-6">
                                    <h2 className="flex items-center justify-center w-full gap-3 mb-6 text-2xl text-center transition-colors sm:text-3xl md:text-4xl sm:gap-4 sm:mb-8 font-serif text-slate-900 dark:text-slate-100 drop-shadow-sm">
                                        <img src="assets/Istanbul_Aydın_University_logo.svg.png" alt="İAÜ Logo" className="w-auto h-8 object-contain sm:h-12 md:h-14 drop-shadow" onError={(e) => { e.target.style.display='none'; }} />
                                        <span>İstanbul Aydın Üniversitesi</span>
                                    </h2>
                                    
                                    <div className="relative w-full mb-6 overflow-hidden rounded shadow-xl aspect-square sm:aspect-[16/9] md:aspect-[21/9] border border-gold/30">
                                        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3011.587133725575!2d28.79458617655148!3d40.99052062051735!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x14caa396db59606d%3A0x6594147beb14e9b4!2zxLBzdGFuYnVsIEF5ZMSxbiDDnG5pdmVyc2l0ZXNp!5e0!3m2!1str!2str!4v1779138319153!5m2!1str!2str" className="absolute top-0 left-0 w-full h-full" style={{border:0}} allowFullScreen={true} loading="lazy" referrerPolicy="no-referrer-when-downgrade" />
                                    </div>
                                    
                                    <div className="flex flex-col justify-center w-full max-w-2xl gap-3 sm:flex-row sm:gap-4">
                                        <a href="https://maps.google.com/?q=İstanbul+Aydın+Üniversitesi" target="_blank" rel="noopener noreferrer" className="flex-1 px-4 py-3 text-center text-[10px] tracking-widest transition-all duration-300 shadow-sm hover:shadow-md sm:py-4 sm:text-xs font-mono border text-slate-700 border-slate-300 bg-white hover:border-gold/50 hover:text-gold dark:bg-slate-900/50 dark:border-slate-700 dark:text-slate-300 dark:hover:text-gold backdrop-blur">
                                            {t.mapGoogle}
                                        </a>
                                        <a href="http://maps.apple.com/?q=İstanbul+Aydın+Üniversitesi" target="_blank" rel="noopener noreferrer" className="flex-1 px-4 py-3 text-center text-[10px] tracking-widest transition-all duration-300 shadow-sm hover:shadow-md sm:py-4 sm:text-xs font-mono border text-slate-700 border-slate-300 bg-white hover:border-gold/50 hover:text-gold dark:bg-slate-900/50 dark:border-slate-700 dark:text-slate-300 dark:hover:text-gold backdrop-blur">
                                            {t.mapApple}
                                        </a>
                                    </div>
                                </div>
                            </section>

                            <section id="committees" className="py-20 bg-slate-100/50 dark:bg-slate-900/20 border-t border-slate-200 dark:border-slate-800">
                                <div className="max-w-6xl mx-auto px-6">
                                    <div className="text-center mb-12">
                                        <h2 className="text-3xl md:text-4xl font-serif text-slate-900 dark:text-white mb-2">{t.committeesTitle}</h2>
                                        <div className="w-16 h-[1px] bg-gold mx-auto" />
                                    </div>

                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                        {t.committees.map((com, i) => (
                                            <div key={i} onClick={() => setActiveCom(com)} className="flex flex-col sm:flex-row items-center p-6 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 cursor-pointer hover:border-gold/50 transition-colors group">
                                                <div className="w-full sm:w-2/5 pr-0 sm:pr-4 flex justify-center mb-4 sm:mb-0 shrink-0">
                                                    <img src={staticAssets[com.id]} className="w-full max-w-[160px] object-contain group-hover:scale-105 transition-transform" onError={(e) => { e.target.src='assets/icarus.png'; }} />
                                                </div>
                                                <div className="w-full sm:w-3/5 sm:border-l border-slate-200 dark:border-slate-800 sm:pl-6 flex flex-col justify-between h-full">
                                                    <p className="text-sm text-slate-600 dark:text-slate-400 text-center sm:text-left">{com.desc}</p>
                                                    <span className="text-[10px] text-gold font-mono mt-4 uppercase group-hover:underline text-center sm:text-left">{t.clickInfo} &rarr;</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </section>
                        </div>
                    )}

                    <footer className="py-8 text-center bg-white dark:bg-slate-950 border-t border-slate-200 dark:border-slate-800">
                        <p className="text-sm md:text-base font-signature text-slate-500 dark:text-slate-400">
                            Bilal Talha ÖZTÜRK tarafından <span className="text-slate-900 dark:text-white mx-1 text-base">🖤</span> ile hazırlandı.
                        </p>
                    </footer>

                    <ReelsPopup isOpen={showInstaPopup} onClose={() => setShowInstaPopup(false)} />
                    <ContactModal isOpen={isContactOpen} onClose={() => setIsContactOpen(false)} data={t} />
                    <ApplyModal isOpen={isApplyOpen} onClose={() => setIsApplyOpen(false)} t={t} />
                    {activeCom && <CommitteeModal committee={activeCom} onClose={() => setActiveCom(null)} />}
                </div>
            );
        };

        const MainRoot = () => {
            const [stage, setStage] = useState('LOADING');
            const [lang, setLang] = useState('en');
            const [dark, setDark] = useState(false);

            useEffect(() => {
                document.documentElement.classList.toggle('dark', dark);
                document.documentElement.classList.toggle('light', !dark);
            }, [dark]);

            return (
                <>
                    {stage === 'LOADING' && <Loader onComplete={() => setStage('CONSENT')} />}
                    {stage === 'CONSENT' && <TermsModal data={localeData[lang]} t={localeData[lang]} onAccept={() => setStage('LANG')} />}
                    {stage === 'LANG' && <LangSelector onSelect={(l) => { setLang(l); setStage('MAIN'); }} />}
                    {stage === 'MAIN' && <MainApp lang={lang} />}

                    {stage !== 'LOADING' && (
                        <button onClick={() => setDark(!dark)} className="fixed bottom-6 right-6 p-4 rounded-full shadow-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 z-[999]">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="text-slate-600 dark:text-gold">
                                <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
                            </svg>
                        </button>
                    )}
                </>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<MainRoot />);
    </script>
</body>
</html>
