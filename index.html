    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gold: '#D4AF37',
                    }
                }
            }
        }

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 0.5s ease, color 0.5s ease;
            overflow-x: hidden;
        }

        .font-serif {
            font-family: 'Playfair Display', serif;
        }

        .bg-grid-pattern {
            background-size: 50px 50px;
            background-image: 
                linear-gradient(to right, rgba(212, 175, 55, 0.15) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(212, 175, 55, 0.15) 1px, transparent 1px);
            background-position: center center;
        }

        .line-draw {
            position: relative;
        }
        .line-draw::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0%;
            height: 1px;
            background-color: #D4AF37;
            transition: width 0.3s ease-in-out;
        }
        .line-draw:hover::after {
            width: 100%;
        }

        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent; 
        }
        ::-webkit-scrollbar-thumb {
            background: #D4AF37; 
            border-radius: 4px;
        }

        html.dark body {
            background-color: #020617; 
            color: #f8fafc;
        }
        html.light body {
            background-color: #f1f5f9; /* Göz yormayan mat beyaz/açık gri */
            color: #1e293b;
        }
        
        .globe-scroll {
            animation: scrollGlobe 20s linear infinite;
        }
        
        @keyframes scrollGlobe {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); } /* Sonsuz döngü için harita genişliğinin yarısı kadar kaydır */
        }

        .modal-overlay {
            backdrop-filter: blur(8px);
        }
    </style>
</head>

                    setProgress(prev => {
                        if (prev >= 100) {
                            clearInterval(progressTimer);
                            return 100;
                        }
                        return prev + step;
                    });
                }, interval);

        const Countdown = ({ text }) => {
            const [timeLeft, setTimeLeft] = useState({ days: 0, hours: 0, minutes: 0, seconds: 0 });

            useEffect(() => {
                const targetDate = new Date("2026-09-25T00:00:00").getTime();
                
                const timer = setInterval(() => {
                    const now = new Date().getTime();
                    const difference = targetDate - now;

                    if (difference > 0) {
                        setTimeLeft({
                            days: Math.floor(difference / (1000 * 60 * 60 * 24)),
                            hours: Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)),
                            minutes: Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60)),
                            seconds: Math.floor((difference % (1000 * 60)) / 1000)
                        });
                    } else {
                        clearInterval(timer);
                    }
                }, 1000);

                return () => clearInterval(timer);
            }, []);

            return (
                <div className="mt-12 flex flex-col items-center">
                    <div className="font-mono text-[10px] uppercase tracking-widest text-slate-400 mb-4">{text}</div>
                    <div className="flex gap-4 md:gap-8">

            return (
                <div className="fixed inset-0 z-[150] flex items-center justify-center fade-in px-4">

                        <div className="h-40 md:h-64 bg-white dark:bg-slate-900 relative border-b border-gold/20 flex flex-col items-center justify-center overflow-hidden">

                                <rect x="35" y="15" width="30" height="15" />

                            </svg>
                            <div className="relative z-10 text-gold mb-2 md:mb-4 bg-slate-50 dark:bg-slate-950 p-3 border border-gold/30 rounded-full shadow-lg">

                                        <div className="absolute top-0 left-0 w-2 h-2 border-t border-l border-transparent group-hover:border-gold transition-colors"></div>
                                        <div className="absolute bottom-0 right-0 w-2 h-2 border-b border-r border-transparent group-hover:border-gold transition-colors"></div>

                                        </div>
                                        <h4 className="font-serif text-base sm:text-lg text-slate-800 dark:text-slate-200 mb-1">TBA</h4>
                                        <p className="font-mono text-[8px] sm:text-[9px] md:text-[10px] text-gold uppercase tracking-widest text-center">{role}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const TeamScreen = ({ langData }) => {
            const team = Array(4).fill({ name: "talha", role: "talha" });

            return (
                <div className="pt-24 md:pt-32 pb-20 px-4 md:px-6 max-w-7xl mx-auto min-h-[90vh] fade-in">
                    <div className="text-center mb-12 md:mb-16 relative">
                        <span className="font-mono text-gold tracking-[0.3em] text-[10px] md:text-xs uppercase mb-3 md:mb-4 block">ICARUS MUN 2026</span>

                            <div key={idx} className="relative group p-6 border border-slate-200 dark:border-slate-800 hover:border-gold/50 bg-white dark:bg-slate-900/50 transition-all duration-300 flex flex-col items-center shadow-sm hover:shadow-md">
                                <div className="absolute inset-0 bg-grid-pattern opacity-10 group-hover:opacity-30 transition-opacity"></div>
                                <div className="absolute top-0 right-0 w-2 h-2 border-t border-r border-transparent group-hover:border-gold transition-colors"></div>
                                <div className="absolute bottom-0 left-0 w-2 h-2 border-b border-l border-transparent group-hover:border-gold transition-colors"></div>
                                
                                <div className="w-24 h-24 md:w-32 md:h-32 mb-4 md:mb-6 rounded-full border-2 border-gold/20 p-1 group-hover:border-gold transition-colors relative z-10">
                                    <div className="w-full h-full rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center overflow-hidden">
                                        <svg className="w-12 h-12 md:w-16 md:h-16 text-slate-300 dark:text-slate-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>

                                <h3 className="font-serif text-lg md:text-xl text-slate-800 dark:text-slate-100 mb-1 md:mb-2 relative z-10">{member.name}</h3>

                            </div>
                        ))}
                    </div>
                </div>
            );

            const [activeTab, setActiveTab] = useState('home');
            const [selectedModal, setSelectedModal] = useState(null);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

                            <div className="flex items-center gap-2 sm:gap-3 cursor-pointer" onClick={() => setActiveTab('home')}>
                                <img src="assets/icarusarkaplansiz.png" alt="Logo" className="h-8 sm:h-12 w-auto drop-shadow" onError={(e) => { e.target.src='assets/icarus.png'; }}/>
                                <div className="flex flex-col">
                                    <span className="font-serif font-bold text-sm sm:text-lg tracking-wider text-gold leading-tight">ICARUS</span>
                                    <span className="font-mono text-[7px] sm:text-[10px] tracking-widest text-slate-400 leading-tight">MUN 2026</span>
                                </div>
                            </div>
                            
                            <div className="hidden md:flex gap-8 items-center">

                                <button onClick={() => setActiveTab('team')} className={`text-sm font-medium tracking-wide uppercase transition-colors line-draw ${activeTab === 'team' ? 'text-gold' : 'text-slate-600 dark:text-slate-300 hover:text-gold dark:hover:text-gold'}`}>{t.nav.team}</button>
                                <button className="text-sm font-medium tracking-wide text-slate-600 dark:text-slate-300 hover:text-gold dark:hover:text-gold line-draw uppercase">{t.nav.apply}</button>
                            </div>

                                {isMobileMenuOpen ? (
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                                ) : (
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
                                )}

                    </nav>

                    {/* Mobil Menü Açılır Panel */}
                    {isMobileMenuOpen && (
                        <div className="md:hidden fixed top-16 sm:top-20 left-0 w-full bg-white/95 dark:bg-slate-950/95 backdrop-blur-md border-b border-gold/20 flex flex-col p-4 gap-4 z-30 shadow-lg fade-in">
                            <button onClick={() => { setActiveTab('home'); setIsMobileMenuOpen(false); }} className={`text-sm font-medium tracking-wide uppercase py-2 text-left ${activeTab === 'home' ? 'text-gold' : 'text-slate-600 dark:text-slate-300'}`}>{t.nav.home}</button>
                            <button onClick={() => { setActiveTab('team'); setIsMobileMenuOpen(false); }} className={`text-sm font-medium tracking-wide uppercase py-2 text-left ${activeTab === 'team' ? 'text-gold' : 'text-slate-600 dark:text-slate-300'}`}>{t.nav.team}</button>
                            <button onClick={() => setIsMobileMenuOpen(false)} className="text-sm font-medium tracking-wide text-slate-600 dark:text-slate-300 py-2 text-left uppercase">{t.nav.apply}</button>
                        </div>
                    )}

                    {activeTab === 'team' ? (
                        <TeamScreen langData={t} />
                    ) : (
                        <div>
                            <main className="pt-24 sm:pt-32 pb-16 sm:pb-20 px-4 sm:px-6 max-w-7xl mx-auto flex flex-col items-center justify-center min-h-[90vh] text-center">
                                <div className="absolute top-1/4 left-10 w-[1px] h-64 bg-gradient-to-b from-transparent via-gold/40 to-transparent hidden lg:block"></div>
                                <div className="absolute bottom-1/4 right-10 w-[1px] h-64 bg-gradient-to-b from-transparent via-gold/40 to-transparent hidden lg:block"></div>
                                <div className="absolute top-1/3 left-10 w-16 h-[1px] bg-gold/40 hidden lg:block"></div>

                                <span className="font-mono text-gold tracking-[0.3em] text-[9px] sm:text-sm mb-4 sm:mb-6 uppercase border border-gold/30 py-1 px-3 sm:px-4 rounded-none bg-gold/5 backdrop-blur-sm">{t.heroSubtitle}</span>
                                <h1 className="font-serif text-3xl sm:text-5xl md:text-7xl lg:text-8xl font-bold text-slate-900 dark:text-white mb-4 sm:mb-8 tracking-tight transition-colors">{t.heroTitle}</h1>
                                <p className="max-w-2xl text-slate-600 dark:text-slate-400 text-xs sm:text-lg md:text-xl font-light leading-relaxed mb-8 sm:mb-12 px-2">{t.heroDesc}</p>

                                <div className="flex flex-col sm:flex-row gap-4 sm:gap-6 w-full justify-center max-w-md mx-auto sm:max-w-none">
                                    <div className="flex flex-col items-center w-full sm:w-auto">
                                        <button className="relative px-6 sm:px-8 py-3 sm:py-4 bg-gold/10 border border-gold text-gold hover:bg-gold hover:text-white dark:hover:text-slate-950 font-mono text-xs sm:text-sm tracking-widest transition-all duration-300 group shadow-sm w-full">
                                            <span className="absolute top-0 left-0 w-2 h-2 border-t-2 border-l-2 border-gold group-hover:border-transparent"></span>
                                            <span className="absolute bottom-0 right-0 w-2 h-2 border-b-2 border-r-2 border-gold group-hover:border-transparent"></span>
                                            {t.ctaPrimary}
                                        </button>
                                        <Countdown text={t.countdownText} />
                                    </div>
                                    <div className="flex items-start w-full sm:w-auto mt-4 sm:mt-0">
                                        <button onClick={() => {
                                            document.getElementById('committees').scrollIntoView({ behavior: 'smooth' });
                                        }} className="px-6 sm:px-8 py-3 sm:py-4 border border-slate-300 dark:border-slate-700 text-slate-600 dark:text-slate-300 hover:border-gold/50 hover:text-gold dark:hover:text-gold font-mono text-xs sm:text-sm tracking-widest transition-all duration-300 bg-white/50 dark:bg-slate-900/50 backdrop-blur-sm shadow-sm hover:shadow-md w-full">
                                            {t.ctaSecondary}
                                        </button>
                                    </div>
                                </div>
                            </main>

                            {/* 3D Kıtalı Dünya ve Harita Alanı */}
                            <section className="border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900/80 relative py-12 sm:py-24 transition-colors overflow-hidden">
                                <div className="max-w-7xl mx-auto px-2 sm:px-6 grid grid-cols-2 gap-4 sm:gap-16 items-center">
                                    
                                    {/* Sol Taraf: 3D Dünya (Wireframe + Kıta) */}
                                    <div className="relative flex justify-center items-center w-full">
                                        <div className="relative w-36 h-36 sm:w-80 sm:h-80 flex items-center justify-center rounded-full overflow-hidden" style={{ clipPath: 'circle(50% at 50% 50%)' }}>
                                            <svg className="absolute w-[200%] h-full text-gold/30 globe-scroll" viewBox="0 0 200 100" fill="none" stroke="currentColor" strokeWidth="0.5">
                                                <line x1="0" y1="25" x2="200" y2="25" strokeDasharray="2 2"/>
                                                <line x1="0" y1="50" x2="200" y2="50" strokeDasharray="4 2"/>
                                                <line x1="0" y1="75" x2="200" y2="75" strokeDasharray="2 2"/>
                                                
                                                {/* Kıtalar - Harita 1 */}
                                                <g>
                                                    <path d="M10 15 L25 10 L35 25 L25 45 L15 35 Z" fill="rgba(212, 175, 55, 0.1)"/>
                                                    <path d="M22 50 L32 48 L38 65 L28 85 L20 65 Z" fill="rgba(212, 175, 55, 0.1)"/>
                                                    <path d="M45 15 L75 10 L85 25 L95 40 L70 50 L50 35 Z" fill="rgba(212, 175, 55, 0.1)"/>
                                                    <path d="M48 45 L65 42 L72 60 L60 80 L45 60 Z" fill="rgba(212, 175, 55, 0.1)"/>
                                                    <path d="M80 65 L90 62 L95 75 L85 80 Z" fill="rgba(212, 175, 55, 0.1)"/>
                                                </g>
                                                {/* Kıtalar - Harita 2 (Kopya, sonsuz döngü için) */}
                                                <g transform="translate(100, 0)">
                                                    <path d="M10 15 L25 10 L35 25 L25 45 L15 35 Z" fill="rgba(212, 175, 55, 0.1)"/>
                                                    <path d="M22 50 L32 48 L38 65 L28 85 L20 65 Z" fill="rgba(212, 175, 55, 0.1)"/>
                                                    <path d="M45 15 L75 10 L85 25 L95 40 L70 50 L50 35 Z" fill="rgba(212, 175, 55, 0.1)"/>
                                                    <path d="M48 45 L65 42 L72 60 L60 80 L45 60 Z" fill="rgba(212, 175, 55, 0.1)"/>
                                                    <path d="M80 65 L90 62 L95 75 L85 80 Z" fill="rgba(212, 175, 55, 0.1)"/>
                                                </g>
                                            </svg>
                                            <img src="assets/icarusarkaplansiz.png" alt="Icarus" className="absolute w-[60%] h-auto z-10 drop-shadow-md dark:brightness-150" onError={(e) => { e.target.src='assets/icarus.png'; }} />
                                            <div className="absolute inset-0 rounded-full shadow-[inset_0_0_15px_rgba(212,175,55,0.4)] border border-gold/40 pointer-events-none"></div>
                                        </div>
                                    </div>
                                    
                                    {/* Sağ Taraf: Harita UI */}
                                    <div className="flex flex-col w-full px-2 sm:px-0">
                                        <h2 className="font-serif text-[11px] sm:text-2xl md:text-3xl lg:text-4xl text-slate-900 dark:text-slate-100 mb-2 sm:mb-6 flex flex-col sm:flex-row items-start sm:items-center gap-1 sm:gap-4 transition-colors">
                                            <span className="w-8 sm:w-12 h-[1px] bg-gold hidden sm:block"></span>
                                            <div className="flex items-center gap-1 sm:gap-3">
                                                <img src="assets/Istanbul_Aydın_University_logo.svg.png" alt="İAÜ Logo" className="h-6 sm:h-10 md:h-12 w-auto object-contain" onError={(e) => { e.target.style.display='none'; }} />
                                                <span>İstanbul Aydın Üniversitesi</span>
                                            </div>
                                        </h2>
                                        
                                        <div className="w-full aspect-square sm:aspect-video md:aspect-[4/3] rounded border border-gold/20 overflow-hidden mb-3 sm:mb-6 shadow-sm">
                                            <iframe 
                                                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3011.587133725575!2d28.79458617655148!3d40.99052062051735!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x14caa396db59606d%3A0x6594147beb14e9b4!2zxLBzdGFuYnVsIEF5ZMSxbiDDnG5pdmVyc2l0ZXNp!5e0!3m2!1str!2str!4v1779138319153!5m2!1str!2str" 
                                                className="w-full h-full" 
                                                style={{border:0}} 
                                                allowFullScreen="" 
                                                loading="lazy" 
                                                referrerPolicy="no-referrer-when-downgrade"
                                            ></iframe>
                                        </div>
                                        
                                        <div className="flex flex-col 2xl:flex-row gap-2 sm:gap-4 w-full">
                                            <a href="https://maps.google.com/?q=İstanbul+Aydın+Üniversitesi" target="_blank" className="flex-1 text-center px-1 py-2 sm:px-4 sm:py-3 border border-slate-300 dark:border-slate-700 text-slate-600 dark:text-slate-300 hover:border-gold/50 hover:text-gold dark:hover:text-gold font-mono text-[8px] sm:text-xs tracking-widest transition-all duration-300 bg-slate-50 dark:bg-slate-900/50 shadow-sm hover:shadow-md">
                                                {t.mapGoogle}
                                            </a>
                                            <a href="http://maps.apple.com/?q=İstanbul+Aydın+Üniversitesi" target="_blank" className="flex-1 text-center px-1 py-2 sm:px-4 sm:py-3 border border-slate-300 dark:border-slate-700 text-slate-600 dark:text-slate-300 hover:border-gold/50 hover:text-gold dark:hover:text-gold font-mono text-[8px] sm:text-xs tracking-widest transition-all duration-300 bg-slate-50 dark:bg-slate-900/50 shadow-sm hover:shadow-md">
                                                {t.mapApple}
                                            </a>
                                        </div>
                                    </div>
                                </div>
                            </section>

                            <section id="committees" className="py-16 sm:py-24 border-t border-slate-200 dark:border-slate-800 bg-slate-100 dark:bg-slate-950 transition-colors">
                                <div className="max-w-7xl mx-auto px-4 sm:px-6">
                                    <div className="text-center mb-10 sm:mb-16">
                                        <h2 className="text-2xl sm:text-3xl md:text-5xl font-serif text-slate-900 dark:text-slate-100 mb-3 sm:mb-4">{t.committeesTitle}</h2>
                                        <div className="w-12 sm:w-24 h-[1px] bg-gold mx-auto"></div>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-8">
                                        {t.committees.map((com, idx) => (
                                            <div key={idx} onClick={() => setSelectedModal(com)} className="relative group p-5 sm:p-8 border border-slate-200 dark:border-slate-800 hover:border-gold/50 bg-white dark:bg-slate-900/50 transition-all duration-300 flex flex-col h-full overflow-hidden cursor-pointer shadow-sm hover:shadow-md">
                                                <div className="absolute top-0 left-0 w-2 h-2 border-t border-l border-transparent group-hover:border-gold transition-colors"></div>
                                                <div className="absolute bottom-0 right-0 w-2 h-2 border-b border-r border-transparent group-hover:border-gold transition-colors"></div>
                                                <div className="absolute inset-0 bg-grid-pattern opacity-10 group-hover:opacity-30 transition-opacity"></div>
                                                <div className="relative z-10 flex flex-col h-full">
                                                    <div className="text-gold mb-4 sm:mb-6 bg-gold/10 w-10 h-10 sm:w-16 sm:h-16 flex items-center justify-center rounded-sm group-hover:scale-110 transition-transform duration-500">
                                                        {CommitteeIcons[com.id]}
                                                    </div>
                                                    <h3 className="font-serif text-lg sm:text-2xl text-slate-800 dark:text-slate-100 mb-1 sm:mb-2">{com.name}</h3>
                                                    <div className="font-mono text-[9px] sm:text-[11px] uppercase tracking-widest text-gold mb-3 sm:mb-4 min-h-[24px] sm:min-h-[32px]">{com.agenda}</div>
                                                    <p className="text-slate-600 dark:text-slate-400 text-xs sm:text-sm leading-relaxed flex-grow">{com.desc}</p>
                                                    <div className="mt-4 sm:mt-6 pt-3 sm:pt-6 border-t border-slate-200 dark:border-slate-800 flex items-center justify-between text-[9px] sm:text-xs font-mono text-slate-400 group-hover:text-gold transition-colors">
                                                        <span>SYS.C{idx+1}</span>
                                                        <span>&rarr; EXPLORE</span>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </section>
                        </div>
                    )}

                    <footer className="border-t border-gold/20 py-6 sm:py-8 text-center bg-slate-100 dark:bg-slate-900 transition-colors">
                        <p className="font-mono text-[8px] sm:text-[10px] md:text-xs text-slate-500 dark:text-slate-400 tracking-widest uppercase px-4">{t.footer}</p>
                    </footer>

                    <CommitteeModal committee={selectedModal} onClose={() => setSelectedModal(null)} />
                </div>
            );
        };

        const App = () => {
            const [appState, setAppState] = useState('LOADING');
            const [language, setLanguage] = useState('en');
            const [theme, setTheme] = useState('light');

            const toggleTheme = () => setTheme(prev => prev === 'light' ? 'dark' : 'light');

            useEffect(() => {
                if (theme === 'dark') {
                    document.documentElement.classList.add('dark');
                    document.documentElement.classList.remove('light');
                } else {
                    document.documentElement.classList.remove('dark');
                    document.documentElement.classList.add('light');
                }
            }, [theme]);

            return (
                <React.Fragment>
                    {appState === 'LOADING' && <LoadingScreen onComplete={() => setAppState('CONSENT')} />}
                    {appState === 'CONSENT' && <ConsentScreen langData={content[language]} onAccept={() => setAppState('LANG')} />}
                    {appState === 'LANG' && <LanguageScreen onSelect={(lang) => { setLanguage(lang); setAppState('MAIN'); }} />}
                    {appState === 'MAIN' && <MainScreen lang={language} />}

                    {/* Karanlık Mod Tuşu ROOT seviyesinde - Asla kaybolmaz, hep sağ altta sabit! */}
                    {(appState === 'MAIN' || appState === 'LANG' || appState === 'CONSENT') && (
                        <button onClick={toggleTheme} style={{ position: 'fixed', bottom: '24px', right: '24px', zIndex: 9999 }} className="w-12 h-12 md:w-14 md:h-14 rounded-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-300 shadow-xl hover:shadow-gold/30 hover:border-gold/50 flex items-center justify-center transition-all duration-300 hover:scale-110 group">
                            <div className="relative w-5 h-5 md:w-6 md:h-6 flex items-center justify-center">
                                <svg className={`absolute inset-0 text-slate-700 group-hover:text-gold transition-all duration-500 ease-in-out transform ${theme === 'light' ? 'rotate-0 opacity-100 scale-100' : '-rotate-90 opacity-0 scale-50'}`} xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
                                <svg className={`absolute inset-0 text-gold transition-all duration-500 ease-in-out transform ${theme === 'dark' ? 'rotate-0 opacity-100 scale-100' : 'rotate-90 opacity-0 scale-50'}`} xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
                            </div>
                        </button>
                    )}
                </React.Fragment>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
