        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');

        /* Scroll kilitlenmesini kökten çözen temiz body yapısı */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: auto;
        }

        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 0.5s ease, color 0.5s ease;
            -webkit-tap-highlight-color: transparent;
        }

        /* Modal açıkken sayfanın kaymasını engellemek için güvenli yöntem */
        body.modal-open {
            overflow: hidden !important;
        }

        .font-serif {
            font-family: 'Playfair Display', serif;
        }

        /* Yüksek kaliteli saf CSS Arka Plan Deseni */
        .bg-grid-pattern {
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, rgba(212, 175, 55, 0.08) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(212, 175, 55, 0.08) 1px, transparent 1px);
            background-position: center center;
        }

        .line-draw {
            position: relative;
        }
        
        .line-draw::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0%;
            height: 1px;
            background-color: #D4AF37;
            transition: width 0.3s ease-in-out;
        }
        
        .line-draw:hover::after {
            width: 100%;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: transparent; 
        }
        
        ::-webkit-scrollbar-thumb {
            background: #D4AF37; 
            border-radius: 4px;
        }

        html.dark body {
            background-color: #020617; 
            color: #f8fafc;
        }
        
        html.light body {
            background-color: #f8fafc; 
            color: #1e293b;
        }
        
        .globe-scroll {
            animation: scrollGlobe 25s linear infinite;
        }
        
        @keyframes scrollGlobe {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); } 
        }

        .map-bg-scroll {
            animation: scrollMapBg 60s linear infinite;
        }
        
        @keyframes scrollMapBg {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); } 
        }

        .theme-toggle-fab {
            position: fixed !important;
            bottom: 2rem !important;
            right: 2rem !important;
            z-index: 999999 !important;
        }
        
        @media (max-width: 640px) {
            .theme-toggle-fab {
                bottom: 1.5rem !important;
                right: 1.5rem !important;
            }
        }
    </style>

                            <div className="items-center hidden gap-8 md:flex">
                                <button onClick={() => handleNavClick('home')} className={`text-sm font-medium tracking-wide uppercase transition-colors line-draw ${view === 'home' ? 'text-gold' : 'text-slate-600 dark:text-slate-300 hover:text-gold dark:hover:text-gold'}`}>
                                    {data.nav.home}

                                <button onClick={() => handleNavClick('team')} className={`text-sm font-medium tracking-wide uppercase transition-colors line-draw ${view === 'team' ? 'text-gold' : 'text-slate-600 dark:text-slate-300 hover:text-gold dark:hover:text-gold'}`}>
                                    {data.nav.team}
                                </button>
                                <button className="text-sm font-medium tracking-wide uppercase transition-colors line-draw text-slate-600 dark:text-slate-300 hover:text-gold dark:hover:text-gold">

                                </button>
                                <button onClick={() => setIsContactOpen(true)} className="p-2 ml-4 rounded-full transition-colors text-slate-500 hover:text-gold dark:text-slate-400 dark:hover:text-gold border border-transparent hover:border-gold/30">

                                        <rect width="20" height="16" x="2" y="4" rx="2"/>
                                        <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>

                                        <rect width="20" height="16" x="2" y="4" rx="2"/>
                                        <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                                    </svg>
                                </div>
                                <div className="p-2 cursor-pointer text-gold" onClick={toggleMobileMenu}>
                                    {isMenuOpen ? (
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                            <line x1="18" y1="6" x2="6" y2="18" />

                                        </svg>
                                    ) : (
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                            <line x1="4" x2="20" y1="12" y2="12" />
                                            <line x1="4" x2="20" y1="6" x2="6" />
                                            <line x1="4" x2="20" y1="18" y2="18" />
                                        </svg>
                                    )}
                                </div>
                            </div>
                        </div>
                    </nav>

                    {isMenuOpen && (
                        <div className="fixed top-16 left-0 z-30 flex flex-col w-full p-4 gap-4 shadow-lg backdrop-blur-md fade-in sm:top-20 md:hidden border-b border-gold/20 bg-white/95 dark:bg-slate-950/95">
                            <button onClick={() => handleNavClick('home')} className={`py-2 text-sm font-medium text-left tracking-wide uppercase ${view === 'home' ? 'text-gold' : 'text-slate-600 dark:text-slate-300'}`}>
                                {data.nav.home}
                            </button>
                            <button onClick={() => handleNavClick('team')} className={`py-2 text-sm font-medium text-left tracking-wide uppercase ${view === 'team' ? 'text-gold' : 'text-slate-600 dark:text-slate-300'}`}>
                                {data.nav.team}
                            </button>
                            <button onClick={() => setIsMenuOpen(false)} className="py-2 text-sm font-medium text-left tracking-wide uppercase text-slate-600 dark:text-slate-300">
                                {data.nav.apply}
                            </button>
                        </div>
                    )}

                    {view === 'team' ? (
                        <div className="fade-in relative z-10 w-full">
                            <TeamSection data={data} />
                        </div>
                    ) : (
                        <div className="fade-in relative z-10 w-full">
                            <div className="relative flex flex-col items-center justify-center w-full min-h-[90vh] overflow-hidden border-b border-gold/20">
                                
                                <div className="absolute inset-0 z-0 pointer-events-none bg-[url('assets/icarusyuklenme2.png')] bg-cover bg-center bg-no-repeat opacity-40 dark:opacity-20" />
                                
                                <WorldMapContinents />

                                <main className="relative z-10 flex flex-col items-center justify-center w-full max-w-7xl mx-auto px-4 pt-24 pb-16 text-center sm:pt-32 sm:pb-20 sm:px-6">
                                    <span className="px-3 py-1 mb-4 text-[9px] sm:text-sm tracking-[0.3em] uppercase rounded-none backdrop-blur-sm sm:mb-6 sm:px-4 font-mono text-gold border border-gold/30 bg-gold/10">
                                        {data.heroSubtitle}
                                    </span>
                                    <h1 className="mb-4 text-3xl font-bold tracking-tight leading-tight transition-colors sm:text-5xl md:text-6xl lg:text-7xl sm:mb-8 font-serif text-slate-900 dark:text-white drop-shadow-sm max-w-5xl">
                                        {data.heroTitle}
                                    </h1>
                                    
                                    <p className="max-w-3xl px-2 mb-8 text-xs font-light leading-relaxed sm:text-sm md:text-base sm:mb-12 text-slate-700 dark:text-slate-400">
                                        {lang === 'en' ? (
                                            <>Represent your country, defend your ideas, and challenge perspectives in a high-energy Model United Nations experience built for the next generation of decision makers.<br/> No limits. Just voices that shape the world.<br/><strong className="font-bold text-gold text-sm sm:text-lg mt-2 inline-block">Are you ready to rise?</strong></>
                                        ) : (
                                            <>Ülkenizi temsil edin, fikirlerinizi savunun ve yeni nesil karar alıcılar için tasarlanmış yüksek enerjili bir Model Birleşmiş Milletler deneyiminde bakış açılarına meydan okuyun.<br/> Sınır yok. Sadece dünyayı şekillendiren sesler var.<br/><strong className="font-bold text-gold text-sm sm:text-lg mt-2 inline-block">Yükselmeye hazır mısınız?</strong></>
                                        )}
                                    </p>

                                    <div className="flex flex-col sm:flex-row justify-center w-full max-w-md sm:max-w-none mx-auto gap-4 sm:gap-6">
                                        <div className="flex flex-col gap-4 w-full sm:w-auto">
                                            <button className="relative w-full px-6 py-3 text-xs tracking-widest transition-all duration-300 shadow-sm group sm:px-8 sm:py-4 sm:text-sm font-mono border text-white border-gold bg-gold hover:bg-gold/80 overflow-hidden">
                                                <span className="relative z-10">{data.ctaDelegate}</span>
                                            </button>
                                            <button className="relative w-full px-6 py-3 text-xs tracking-widest transition-all duration-300 shadow-sm group sm:px-8 sm:py-4 sm:text-sm font-mono border text-gold border-gold bg-gold/10 hover:bg-gold hover:text-white dark:hover:text-slate-950">
                                                <span className="relative z-10">{data.ctaDelegation}</span>
                                            </button>
                                        </div>
                                        <div className="flex items-start w-full mt-4 sm:w-auto sm:mt-0">
                                            <button onClick={handleScrollToCommittees} className="w-full h-full px-6 py-3 text-xs tracking-widest transition-all duration-300 shadow-sm backdrop-blur-sm hover:shadow-md sm:px-8 sm:py-4 sm:text-sm font-mono border text-slate-700 border-slate-400 bg-white/80 hover:border-gold/50 hover:text-gold dark:bg-slate-900/50 dark:border-slate-700 dark:text-slate-300 dark:hover:text-gold">
                                                {data.ctaCommittees}
                                            </button>
                                        </div>
                                    </div>
                                    <Countdown label={data.countdownText} />
                                </main>
                            </div>

                            <section className="relative py-12 overflow-hidden transition-colors sm:py-24 border-t border-slate-300 dark:border-slate-800 bg-[url('assets/icarusyuklenme2.png')] bg-cover bg-center bg-no-repeat">
                                <div className="absolute inset-0 bg-slate-100/80 dark:bg-slate-950/80 backdrop-blur-[2px]" />
                                <div className="relative z-10 flex flex-col items-center max-w-7xl mx-auto px-4 sm:px-6">
                                    
                                    <h2 className="flex items-center justify-center w-full gap-3 mb-6 text-2xl text-center transition-colors sm:text-3xl md:text-4xl sm:gap-4 sm:mb-8 font-serif text-slate-900 dark:text-slate-100 drop-shadow-sm">
                                        <img 
                                            src="assets/Istanbul_Aydın_University_logo.svg.png" 
                                            alt="İAÜ Logo" 
                                            className="w-auto h-8 object-contain sm:h-12 md:h-14 drop-shadow" 
                                            onError={(e) => { e.target.style.display='none'; }} 
                                        />
                                        <span>İstanbul Aydın Üniversitesi</span>
                                    </h2>
                                    
                                    <div className="w-full mb-6 overflow-hidden rounded shadow-xl aspect-square sm:aspect-[16/9] md:aspect-[21/9] border border-gold/30">
                                        <iframe 
                                            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3011.587133725575!2d28.79458617655148!3d40.99052062051735!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x14caa396db59606d%3A0x6594147beb14e9b4!2zxLBzdGFuYnVsIEF5ZMSxbiDDnG5pdmVyc2l0ZXNp!5e0!3m2!1str!2str!4v1779138319153!5m2!1str!2str" 
                                            className="w-full h-full" 
                                            style={{border:0}} 
                                            allowFullScreen={true} 
                                            loading="lazy" 
                                            referrerPolicy="no-referrer-when-downgrade"
                                        />
                                    </div>
                                    
                                    <div className="flex flex-col justify-center w-full max-w-2xl gap-3 sm:flex-row sm:gap-4">
                                        <a href="https://maps.google.com/?q=İstanbul+Aydın+Üniversitesi" target="_blank" rel="noopener noreferrer" className="flex-1 px-4 py-3 text-center text-[10px] tracking-widest transition-all duration-300 shadow-sm hover:shadow-md sm:py-4 sm:text-xs font-mono border text-slate-700 border-slate-300 bg-white hover:border-gold/50 hover:text-gold dark:bg-slate-900/50 dark:border-slate-700 dark:text-slate-300 dark:hover:text-gold backdrop-blur">
                                            {data.mapGoogle}
                                        </a>
                                        <a href="http://maps.apple.com/?q=İstanbul+Aydın+Üniversitesi" target="_blank" rel="noopener noreferrer" className="flex-1 px-4 py-3 text-center text-[10px] tracking-widest transition-all duration-300 shadow-sm hover:shadow-md sm:py-4 sm:text-xs font-mono border text-slate-700 border-slate-300 bg-white hover:border-gold/50 hover:text-gold dark:bg-slate-900/50 dark:border-slate-700 dark:text-slate-300 dark:hover:text-gold backdrop-blur">
                                            {data.mapApple}
                                        </a>
                                    </div>
                                </div>
                            </section>

                            <section id="committees" className="py-16 transition-colors sm:py-24 border-t border-slate-300 dark:border-slate-800 bg-slate-50 dark:bg-slate-950 relative z-10 w-full overflow-hidden">
                                <div className="max-w-7xl mx-auto px-4 sm:px-6">
                                    <div className="flex flex-col items-center mb-10 text-center sm:mb-16">
                                        <div className="flex items-center justify-center gap-3 mb-3 sm:gap-5 sm:mb-4">
                                            <div className="relative flex items-center justify-center flex-shrink-0 w-12 h-12 overflow-hidden rounded-full sm:w-16 sm:h-16 md:w-20 md:h-20" style={{ clipPath: 'circle(50% at 50% 50%)' }}>
                                                
                                                <svg className="absolute w-[200%] h-full text-gold/40 globe-scroll" viewBox="0 0 1000 500" fill="none" stroke="currentColor" strokeWidth="2">
                                                    <line x1="0" y1="125" x2="1000" y2="125" strokeDasharray="4 4" />
                                                    <line x1="0" y1="250" x2="1000" y2="250" strokeDasharray="8 4" />
                                                    <line x1="0" y1="375" x2="1000" y2="375" strokeDasharray="4 4" />
                                                    <g transform="scale(0.5)">
                                                        <path d="M120,60 Q180,30 250,50 T300,120 Q320,180 250,220 Q180,240 150,180 Q100,120 120,60 Z" />
                                                        <path d="M230,230 Q280,220 300,280 T260,420 Q230,450 210,350 Q180,280 230,230 Z" />
                                                        <path d="M450,50 Q600,20 800,40 T950,150 Q980,220 880,200 Q800,180 750,250 Q650,280 550,220 Q480,250 420,150 Q400,80 450,50 Z" />
                                                        <path d="M450,200 Q550,180 580,250 T500,400 Q450,420 420,320 Q400,250 450,200 Z" />
                                                        <path d="M820,300 Q880,280 920,320 T880,400 Q820,400 800,350 Q780,300 820,300 Z" />
                                                    </g>
                                                    <g transform="translate(500, 0) scale(0.5)">
                                                        <path d="M120,60 Q180,30 250,50 T300,120 Q320,180 250,220 Q180,240 150,180 Q100,120 120,60 Z" />
                                                        <path d="M230,230 Q280,220 300,280 T260,420 Q230,450 210,350 Q180,280 230,230 Z" />
                                                        <path d="M450,50 Q600,20 800,40 T950,150 Q980,220 880,200 Q800,180 750,250 Q650,280 550,220 Q480,250 420,150 Q400,80 450,50 Z" />
                                                        <path d="M450,200 Q550,180 580,250 T500,400 Q450,420 420,320 Q400,250 450,200 Z" />
                                                        <path d="M820,300 Q880,280 920,320 T880,400 Q820,400 800,350 Q780,300 820,300 Z" />
                                                    </g>
                                                </svg>

                                                <img 
                                                    src="assets/icarusarkaplansiz.png" 
                                                    alt="Icarus" 
                                                    className="absolute z-10 w-[60%] h-auto drop-shadow-md dark:brightness-150" 
                                                    onError={(e) => { e.target.src='assets/icarus.png'; }} 
                                                />
                                                <div className="absolute inset-0 pointer-events-none rounded-full shadow-[inset_0_0_10px_rgba(212,175,55,0.4)] border border-gold/40" />
                                            </div>
                                            <div className="flex flex-col items-start">
                                                <h2 className="text-2xl text-left sm:text-3xl md:text-5xl font-serif text-slate-900 dark:text-slate-100">
                                                    {data.committeesTitle}
                                                </h2>
                                                <span className="text-[10px] sm:text-xs font-mono tracking-widest uppercase text-gold mt-1 sm:mt-2">
                                                    {data.clickCommittees}
                                                </span>
                                            </div>
                                        </div>
                                        <div className="w-16 mx-auto sm:w-32 h-[1px] bg-gold" />
                                    </div>

                                    <div className="grid grid-cols-1 gap-4 md:grid-cols-2 lg:grid-cols-3 sm:gap-8">
                                        {data.committees.map((com, index) => (
                                            <div 
                                                key={index} 
                                                onClick={() => setActiveCommittee(com)} 
                                                className="relative flex flex-col h-full p-5 overflow-hidden transition-all duration-300 cursor-pointer shadow-sm group hover:shadow-md sm:p-8 border border-slate-300 dark:border-slate-800 hover:border-gold/50 bg-white dark:bg-slate-900/50"
                                            >
                                                <div className="absolute top-0 left-0 w-2 h-2 border-t border-l border-transparent transition-colors group-hover:border-gold" />
                                                <div className="absolute bottom-0 right-0 w-2 h-2 border-b border-r border-transparent transition-colors group-hover:border-gold" />
                                                <div className="absolute inset-0 opacity-10 transition-opacity bg-grid-pattern group-hover:opacity-30" />
                                                
                                                <div className="relative z-10 flex flex-col h-full">
                                                    <div className="flex items-center justify-center w-10 h-10 mb-4 transition-transform duration-500 rounded-sm sm:mb-6 sm:w-16 sm:h-16 text-gold bg-gold/10 group-hover:scale-110">
                                                        {SVGIcons[com.id]}
                                                    </div>
                                                    <h3 className="mb-1 text-lg sm:text-2xl sm:mb-2 font-serif text-slate-800 dark:text-slate-100">
                                                        {com.name}
                                                    </h3>
                                                    <div className="mb-3 text-[9px] min-h-[24px] tracking-widest uppercase sm:text-[11px] sm:mb-4 sm:min-h-[32px] font-mono text-gold">
                                                        {com.agenda}
                                                    </div>
                                                    <p className="flex-grow text-xs leading-relaxed sm:text-sm text-slate-600 dark:text-slate-400">
                                                        {com.desc}
                                                    </p>
                                                    <div className="flex items-center justify-between pt-3 mt-4 text-[9px] transition-colors sm:mt-6 sm:pt-6 sm:text-xs font-mono text-slate-500 dark:text-slate-400 group-hover:text-gold border-t border-slate-300 dark:border-slate-800">
                                                        <span>SYS.C{index + 1}</span>
                                                        <span>&rarr; EXPLORE</span>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </section>
                        </div>
                    )}

                    <footer className="py-6 text-center transition-colors sm:py-8 border-t border-gold/20 bg-white dark:bg-slate-900">
                        <p className="px-4 text-[8px] tracking-widest uppercase sm:text-[10px] md:text-xs font-mono text-slate-500 dark:text-slate-400">
                            {data.footer}
                        </p>
                    </footer>

                    <InstaPopupModal
                        isOpen={showInstaPopup}
                        onClose={() => setShowInstaPopup(false)}
                    />

                    <ContactModal 
                        isOpen={isContactOpen} 
                        onClose={() => setIsContactOpen(false)} 
                        data={data}
                    />

                    {/* Düzeltme: Modal yalnızca activeCommittee null olmadığında (bir komite seçildiğinde) render ediliyor */}
                    {activeCommittee && (
                        <CommitteeModal 
                            committee={activeCommittee} 
                            onClose={() => setActiveCommittee(null)} 
                        />
                    )}
                </div>
            );
        };

        const ApplicationRoot = () => {
            const [stage, setStage] = useState('LOADING');
            const [language, setLanguage] = useState('en');
            const [theme, setTheme] = useState('light');

            const toggleTheme = () => setTheme(prev => (prev === 'light' ? 'dark' : 'light'));

            // BU KOD EKRAN KİLİTLENMESİNİ TAMAMEN SIFIRLAR VE İLK AÇILIŞTA GÜVENLİ HALE GETİRİR
            useEffect(() => {
                document.body.classList.remove('modal-open');
                document.documentElement.style.overflow = '';
                document.body.style.overflow = '';
            }, []);

            useEffect(() => {
                const rootElement = document.documentElement;
                if (theme === 'dark') {
                    rootElement.classList.add('dark');
                    rootElement.classList.remove('light');
                } else {
                    rootElement.classList.remove('dark');
                    rootElement.classList.add('light');
                }
            }, [theme]);

            const renderStage = () => {
                switch (stage) {
                    case 'LOADING':
                        return <LoadingScreen onComplete={() => setStage('CONSENT')} />;
                    case 'CONSENT':
                        return <ConsentScreen data={localeData[language]} onAccept={() => setStage('LANG')} />;
                    case 'LANG':
                        return <LanguageScreen onSelect={(lang) => { setLanguage(lang); setStage('MAIN'); }} />;
                    case 'MAIN':
                        return <MainApp lang={language} />;
                    default:
                        return null;
                }
            };

            const isAppReady = ['MAIN', 'LANG', 'CONSENT'].includes(stage);

            return (
                <>
                    {renderStage()}
                    
                    {isAppReady && (
                        <button 
                            onClick={toggleTheme} 
                            className="flex items-center justify-center w-12 h-12 transition-all duration-300 rounded-full shadow-xl theme-toggle-fab md:w-14 md:h-14 group bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-800 hover:shadow-gold/30 hover:border-gold/50 hover:scale-110"
                        >
                            <div className="relative flex items-center justify-center w-5 h-5 md:w-6 md:h-6">
                                <svg className={`absolute inset-0 transition-all duration-500 ease-in-out transform ${theme === 'light' ? 'rotate-0 opacity-100 scale-100' : '-rotate-90 opacity-0 scale-50'} text-slate-600 group-hover:text-gold`} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                    <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
                                </svg>
                                <svg className={`absolute inset-0 transition-all duration-500 ease-in-out transform ${theme === 'dark' ? 'rotate-0 opacity-100 scale-100' : 'rotate-90 opacity-0 scale-50'} text-gold`} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                    <circle cx="12" cy="12" r="4" />
                                    <path d="M12 2v2" />
                                    <path d="M12 20v2" />
                                    <path d="m4.93 4.93 1.41 1.41" />
                                    <path d="m17.66 17.66 1.41 1.41" />
                                    <path d="M2 12h2" />
                                    <path d="M20 12h2" />
                                    <path d="m6.34 17.66-1.41 1.41" />
                                    <path d="m19.07 4.93-1.41 1.41" />
                                </svg>
                            </div>
                        </button>
                    )}
                </>
            );
        };

        const rootNode = document.getElementById('root');
        ReactDOM.createRoot(rootNode).render(<ApplicationRoot />);
    </script>
</body>
</html>
