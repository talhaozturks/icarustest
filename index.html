    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: auto;
        }

        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 0.5s ease, color 0.5s ease;
            -webkit-tap-highlight-color: transparent;
        }

        body.modal-open {
            overflow: hidden !important;
        }

        .font-serif {
            font-family: 'Playfair Display', serif;
        }

        .bg-grid-pattern {
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, rgba(212, 175, 55, 0.08) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(212, 175, 55, 0.08) 1px, transparent 1px);
            background-position: center center;
        }

        .line-draw { position: relative; }
        .line-draw::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0%;
            height: 1px;
            background-color: #D4AF37;
            transition: width 0.3s ease-in-out;
        }
        .line-draw:hover::after { width: 100%; }

        .fade-in { animation: fadeIn 0.4s ease-out forwards; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 4px; }

        html.dark body { background-color: #020617; color: #f8fafc; }
        html.light body { background-color: #f8fafc; color: #1e293b; }
        
        .globe-scroll { animation: scrollGlobe 25s linear infinite; }
        @keyframes scrollGlobe {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); } 
        }

        .map-bg-scroll { animation: scrollMapBg 60s linear infinite; }
        @keyframes scrollMapBg {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); } 
        }

        .theme-toggle-fab {
            position: fixed !important;
            bottom: 2rem !important;
            right: 2rem !important;
            z-index: 999999 !important;
        }
        
        @media (max-width: 640px) {
            .theme-toggle-fab {
                bottom: 1.5rem !important;
                right: 1.5rem !important;
            }
        }
    </style>
</head>

            );
        };

        const LangSelector = ({ onSelect }) => (
            <div className="fixed inset-0 z-40 flex items-center justify-center px-4 bg-slate-50 dark:bg-slate-950 bg-grid-pattern transition-colors">
                <div className="flex flex-col items-center w-full max-w-2xl fade-in">
                    <div className="mb-12 text-center">
                        <h2 className="mb-4 text-2xl md:text-3xl font-light tracking-widest font-serif text-slate-800 dark:text-slate-200">Select Language</h2>
                        <div className="w-20 h-[1px] mx-auto bg-gold/50" />
                    </div>
                    <div className="flex flex-col sm:flex-row gap-6">
                        <button onClick={() => onSelect('en')} className="w-52 p-8 border border-slate-200 dark:border-slate-800 hover:border-gold/60 bg-white dark:bg-slate-900/80 transition-colors group flex flex-col items-center justify-center">
                            <img src="assets/icarus_british_bayrak_dil_secim.png" alt="English Flag" className="w-24 h-16 mb-4 object-cover opacity-80 transition-opacity drop-shadow-sm group-hover:opacity-100" />
                            <span className="text-sm tracking-widest font-mono text-slate-500 dark:text-slate-400 group-hover:text-gold">ENGLISH</span>
                        </button>
                        <button onClick={() => onSelect('tr')} className="w-52 p-8 border border-slate-200 dark:border-slate-800 hover:border-gold/60 bg-white dark:bg-slate-900/80 transition-colors group flex flex-col items-center justify-center">
                            <img src="assets/icarus_turkish_bayrak_dil_secim.png" alt="Türkçe Bayrak" className="w-24 h-16 mb-4 object-cover opacity-80 transition-opacity drop-shadow-sm group-hover:opacity-100" />
                            <span className="text-sm tracking-widest font-mono text-slate-500 dark:text-slate-400 group-hover:text-gold">TÜRKÇE</span>
                        </button>
                    </div>
                </div>
            </div>
        );

        const Countdown = ({ label }) => {
            const [time, setTime] = useState({ d: 0, h: 0, m: 0, s: 0 });

            useEffect(() => {
                const target = new Date("2026-09-04T00:00:00").getTime();
                const timer = setInterval(() => {
                    const diff = target - Date.now();
                    if (diff > 0) {
                        setTime({
                            d: Math.floor(diff / (1000 * 60 * 60 * 24)),
                            h: Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)),
                            m: Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)),
                            s: Math.floor((diff % (1000 * 60)) / 1000)
                        });
                    } else clearInterval(timer);
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            return (
                <div className="flex flex-col items-center mt-12 w-full">
                    <div className="mb-4 text-[10px] tracking-widest uppercase font-mono text-slate-500 dark:text-slate-400">{label}</div>
                    <div className="flex gap-4 justify-center">
                        {Object.entries(time).map(([u, v], i) => (
                            <div key={i} className="flex flex-col items-center">
                                <div className="flex items-center justify-center w-14 h-14 md:w-20 md:h-20 border border-slate-300 dark:border-slate-800 bg-white dark:bg-slate-900 font-serif text-2xl md:text-4xl text-gold">
                                    {String(v).padStart(2, '0')}
                                </div>
                                <span className="mt-2 text-[10px] uppercase font-mono text-slate-500">{u}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const ContactModal = ({ isOpen, onClose, data }) => {
            useEffect(() => {
                document.body.classList.toggle('modal-open', isOpen);
                return () => document.body.classList.remove('modal-open');
            }, [isOpen]);

            if (!isOpen) return null;

            const mailSubject = "IcarusMUN Bilgi Talebi";
            const mailBody = "Merhaba şu konu hakkında bilgi almak istiyorum…";
            const mailtoLink = `mailto:icarusmun.information@gmail.com?subject=${encodeURIComponent(mailSubject)}&body=${encodeURIComponent(mailBody)}`;

            return ReactDOM.createPortal(
                <div className="fixed inset-0 z-[99999] flex items-center justify-center px-4 fade-in bg-slate-950/80 backdrop-blur-sm">
                    <div className="absolute inset-0 cursor-pointer" onClick={onClose} />
                    <div className="relative z-10 flex flex-col items-center w-full max-w-md p-8 sm:p-12 overflow-hidden shadow-2xl bg-white dark:bg-slate-950 border border-gold/40 rounded-xl">
                        <button onClick={onClose} className="absolute top-4 right-4 p-2 rounded-full bg-slate-100/50 dark:bg-slate-900/50 text-slate-500 hover:text-gold transition-colors">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6 6 18" /><path d="m6 6 12 12" /></svg>
                        </button>
                        
                        <div className="p-4 mb-4 rounded-full shadow-lg text-gold bg-slate-50 dark:bg-slate-900 border border-gold/30">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                        </div>
                        
                        <h2 className="mb-4 text-2xl sm:text-3xl font-serif text-slate-900 dark:text-white text-center">{data.contactTitle}</h2>
                        <div className="w-16 h-[1px] bg-gold mb-6" />
                        <p className="mb-2 text-xs tracking-widest font-mono text-slate-500 dark:text-slate-400">{data.contactEmail}</p>
                        <p className="mb-8 text-sm sm:text-base font-semibold text-slate-800 dark:text-slate-200 break-all">icarusmun.information@gmail.com</p>

                        <a href={mailtoLink} className="w-full text-center px-6 py-4 text-xs tracking-widest transition-all duration-300 shadow-sm sm:text-sm font-mono border text-gold border-gold bg-gold/10 hover:bg-gold hover:text-white dark:hover:text-slate-950">
                            {data.contactBtn}
                        </a>
                    </div>
                </div>,
                document.body
            );
        };

        const MainApp = ({ lang }) => {
            const t = localeData[lang];
            const [view, setView] = useState('home');
            const [activeCom, setActiveCom] = useState(null);
            const [menuOpen, setMenuOpen] = useState(false);
            const [showInstaPopup, setShowInstaPopup] = useState(true);
            const [isContactOpen, setIsContactOpen] = useState(false);

            const handleScrollToCommittees = () => {
                const element = document.getElementById('committees');
                if (element) {
                    element.scrollIntoView({ behavior: 'smooth' });
                }
            };

            return (
                <div className="relative w-full min-h-screen transition-colors duration-500 bg-slate-50 dark:bg-slate-950">
                    <nav className="fixed top-0 inset-x-0 z-40 bg-white/95 dark:bg-slate-950/95 backdrop-blur border-b border-gold/20">
                        <div className="flex items-center justify-between h-16 md:h-20 max-w-7xl mx-auto px-4 sm:px-6">
                            <div className="flex items-center gap-3 cursor-pointer" onClick={() => setView('home')}>
                                <img src="assets/icarusarkaplansiz.png" alt="Logo" className="h-8 md:h-12" />
                                <div className="flex flex-col">
                                    <span className="text-sm md:text-lg font-bold font-serif text-gold tracking-widest">ICARUS</span>
                                    <span className="text-[10px] font-mono text-slate-500">MUN 2026</span>
                                </div>
                            </div>
                            
                            <div className="hidden md:flex gap-8 items-center">
                                <button onClick={() => setView('home')} className="text-sm uppercase tracking-wide text-slate-600 dark:text-slate-300 hover:text-gold transition">{t.nav.home}</button>
                                <button onClick={() => setView('team')} className="text-sm uppercase tracking-wide text-slate-600 dark:text-slate-300 hover:text-gold transition">{t.nav.team}</button>
                                <button className="text-sm uppercase tracking-wide text-slate-600 dark:text-slate-300 hover:text-gold transition">{t.nav.apply}</button>
                                <button onClick={() => setIsContactOpen(true)} className="p-2 ml-4 rounded-full transition-colors text-slate-500 hover:text-gold dark:text-slate-400 dark:hover:text-gold border border-transparent hover:border-gold/30">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                                </button>
                            </div>

                            <div className="flex items-center gap-2 md:hidden">
                                <div className="p-2 cursor-pointer text-slate-500 hover:text-gold dark:text-slate-400 transition-colors" onClick={() => setIsContactOpen(true)}>
                                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                                </div>
                                <button className="p-2 text-gold" onClick={() => setMenuOpen(!menuOpen)}>
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                                        <line x1="4" x2="20" y1="12" y2="12" /><line x1="4" x2="20" y1="6" y2="6" /><line x1="4" x2="20" y1="18" y2="18" />
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </nav>

                    {menuOpen && (
                        <div className="fixed top-16 left-0 w-full bg-white/95 dark:bg-slate-950/95 z-30 flex flex-col p-4 border-b border-gold/20">
                            <button onClick={() => { setView('home'); setMenuOpen(false); }} className="py-3 text-left font-medium text-slate-800 dark:text-slate-200">{t.nav.home}</button>
                            <button onClick={() => { setView('team'); setMenuOpen(false); }} className="py-3 text-left font-medium text-slate-800 dark:text-slate-200">{t.nav.team}</button>
                        </div>
                    )}

                    {view === 'team' ? (
                        <div className="max-w-7xl mx-auto pt-28 pb-16 px-6 fade-in">
                            <div className="text-center mb-16">
                                <p className="text-xs font-mono text-gold tracking-[0.3em] mb-2">{t.teamDesc}</p>
                                <h1 className="text-4xl md:text-5xl font-serif text-slate-900 dark:text-white">{t.teamTitle}</h1>
                                <div className="w-16 h-[1px] bg-gold mx-auto mt-6" />
                            </div>
                            <div className="flex justify-center text-slate-500">Ekip üyeleri yakında eklenecektir.</div>
                        </div>
                    ) : (
                        <div className="fade-in relative z-10 w-full">
                            <div className="relative flex flex-col items-center justify-center w-full min-h-[90vh] overflow-hidden border-b border-gold/20">
                                <div className="absolute inset-0 z-0 bg-[url('assets/icarusyuklenme2.png')] bg-cover bg-center opacity-30 dark:opacity-20" />
                                <AnimatedMap />

                                <main className="relative z-10 flex flex-col items-center text-center w-full max-w-4xl mx-auto px-6 pt-32 pb-20">
                                    <span className="px-4 py-1 mb-6 text-xs tracking-[0.3em] font-mono text-gold bg-gold/10 border border-gold/30">
                                        {t.heroSubtitle}
                                    </span>
                                    <h1 className="mb-6 text-5xl sm:text-7xl font-bold font-serif text-slate-900 dark:text-white drop-shadow-sm">
                                        {t.heroTitle}
                                    </h1>
                                    <p className="mb-10 text-sm md:text-base text-slate-700 dark:text-slate-400">
                                        {lang === 'en' ? 
                                            <>Represent your country, defend your ideas, and challenge perspectives in a high-energy Model United Nations experience built for the next generation of decision makers.<br/><br/><strong className="text-gold">Are you ready to rise?</strong></> : 
                                            <>Ülkenizi temsil edin, fikirlerinizi savunun ve yeni nesil karar alıcılar için tasarlanmış yüksek enerjili bir Model Birleşmiş Milletler deneyiminde bakış açılarına meydan okuyun.<br/><br/><strong className="text-gold">Yükselmeye hazır mısınız?</strong></>
                                        }
                                    </p>

                                    <div className="flex flex-col sm:flex-row gap-4 w-full justify-center">
                                        <button className="px-8 py-4 text-xs font-mono tracking-widest text-white bg-gold hover:bg-gold/80 transition-colors">
                                            {t.ctaDelegate}
                                        </button>
                                        <button className="px-8 py-4 text-xs font-mono tracking-widest text-gold border border-gold hover:bg-gold/10 transition-colors">
                                            {t.ctaDelegation}
                                        </button>
                                    </div>
                                    <Countdown label={t.countdownText} />
                                </main>
                            </div>

                            {/* HARİTA KISMI GERİ EKLENDİ */}
                            <section className="relative py-12 overflow-hidden transition-colors sm:py-24 border-t border-slate-300 dark:border-slate-800 bg-[url('assets/icarusyuklenme2.png')] bg-cover bg-center bg-no-repeat">
                                <div className="absolute inset-0 bg-slate-100/80 dark:bg-slate-950/80 backdrop-blur-[2px]" />
                                <div className="relative z-10 flex flex-col items-center max-w-7xl mx-auto px-4 sm:px-6">
                                    <h2 className="flex items-center justify-center w-full gap-3 mb-6 text-2xl text-center transition-colors sm:text-3xl md:text-4xl sm:gap-4 sm:mb-8 font-serif text-slate-900 dark:text-slate-100 drop-shadow-sm">
                                        <img src="assets/Istanbul_Aydın_University_logo.svg.png" alt="İAÜ Logo" className="w-auto h-8 object-contain sm:h-12 md:h-14 drop-shadow" onError={(e) => { e.target.style.display='none'; }} />
                                        <span>İstanbul Aydın Üniversitesi</span>
                                    </h2>
                                    
                                    <div className="w-full mb-6 overflow-hidden rounded shadow-xl aspect-square sm:aspect-[16/9] md:aspect-[21/9] border border-gold/30">
                                        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3011.587133725575!2d28.79458617655148!3d40.99052062051735!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x14caa396db59606d%3A0x6594147beb14e9b4!2zxLBzdGFuYnVsIEF5ZMSxbiDDnG5pdmVyc2l0ZXNp!5e0!3m2!1str!2str!4v1779138319153!5m2!1str!2str" className="w-full h-full" style={{border:0}} allowFullScreen={true} loading="lazy" referrerPolicy="no-referrer-when-downgrade" />
                                    </div>
                                    
                                    <div className="flex flex-col justify-center w-full max-w-2xl gap-3 sm:flex-row sm:gap-4">
                                        <a href="https://maps.google.com/?q=İstanbul+Aydın+Üniversitesi" target="_blank" rel="noopener noreferrer" className="flex-1 px-4 py-3 text-center text-[10px] tracking-widest transition-all duration-300 shadow-sm hover:shadow-md sm:py-4 sm:text-xs font-mono border text-slate-700 border-slate-300 bg-white hover:border-gold/50 hover:text-gold dark:bg-slate-900/50 dark:border-slate-700 dark:text-slate-300 dark:hover:text-gold backdrop-blur">
                                            {t.mapGoogle}
                                        </a>
                                        <a href="http://maps.apple.com/?q=İstanbul+Aydın+Üniversitesi" target="_blank" rel="noopener noreferrer" className="flex-1 px-4 py-3 text-center text-[10px] tracking-widest transition-all duration-300 shadow-sm hover:shadow-md sm:py-4 sm:text-xs font-mono border text-slate-700 border-slate-300 bg-white hover:border-gold/50 hover:text-gold dark:bg-slate-900/50 dark:border-slate-700 dark:text-slate-300 dark:hover:text-gold backdrop-blur">
                                            {t.mapApple}
                                        </a>
                                    </div>
                                </div>
                            </section>

                            <section id="committees" className="py-20 bg-slate-100/50 dark:bg-slate-900/20 border-t border-slate-200 dark:border-slate-800">
                                <div className="max-w-6xl mx-auto px-6">
                                    <div className="text-center mb-12">
                                        <h2 className="text-3xl md:text-4xl font-serif text-slate-900 dark:text-white mb-2">{t.committeesTitle}</h2>
                                        <div className="w-16 h-[1px] bg-gold mx-auto" />
                                    </div>

                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                        {t.committees.map((com, i) => (
                                            <div key={i} onClick={() => setActiveCom(com)} className="flex flex-col sm:flex-row items-center p-6 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 cursor-pointer hover:border-gold/50 transition-colors group">
                                                <div className="w-full sm:w-2/5 pr-0 sm:pr-4 flex justify-center mb-4 sm:mb-0 shrink-0">
                                                    <img src={staticAssets[com.id]} className="w-full max-w-[160px] object-contain group-hover:scale-105 transition-transform" />
                                                </div>
                                                <div className="w-full sm:w-3/5 sm:border-l border-slate-200 dark:border-slate-800 sm:pl-6 flex flex-col justify-between h-full">
                                                    <p className="text-sm text-slate-600 dark:text-slate-400 text-center sm:text-left">{com.desc}</p>
                                                    <span className="text-[10px] text-gold font-mono mt-4 uppercase group-hover:underline text-center sm:text-left">{t.clickInfo} &rarr;</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </section>
                        </div>
                    )}

                    <footer className="py-8 text-center bg-white dark:bg-slate-950 border-t border-slate-200 dark:border-slate-800">
                        <p className="text-[10px] font-mono text-slate-500 uppercase">{t.footer}</p>
                    </footer>

                    <ReelsPopup isOpen={showInstaPopup} onClose={() => setShowInstaPopup(false)} />
                    <ContactModal isOpen={isContactOpen} onClose={() => setIsContactOpen(false)} data={t} />
                    {activeCom && <CommitteeModal committee={activeCom} onClose={() => setActiveCom(null)} />}
                </div>
            );
        };

        const MainRoot = () => {
            const [stage, setStage] = useState('LOADING');
            const [lang, setLang] = useState('en');
            const [dark, setDark] = useState(false);

            useEffect(() => {
                document.documentElement.classList.toggle('dark', dark);
                document.documentElement.classList.toggle('light', !dark);
            }, [dark]);

            return (
                <>
                    {stage === 'LOADING' && <Loader onComplete={() => setStage('CONSENT')} />}
                    {stage === 'CONSENT' && <TermsModal data={localeData[lang]} t={localeData[lang]} onAccept={() => setStage('LANG')} />}
                    {stage === 'LANG' && <LangSelector onSelect={(l) => { setLang(l); setStage('MAIN'); }} />}
                    {stage === 'MAIN' && <MainApp lang={lang} />}

                    {stage !== 'LOADING' && (
                        <button onClick={() => setDark(!dark)} className="fixed bottom-6 right-6 p-4 rounded-full shadow-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 z-[999]">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="text-slate-600 dark:text-gold">
                                <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
                            </svg>
                        </button>
                    )}
                </>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<MainRoot />);
    </script>
</body>
</html>
