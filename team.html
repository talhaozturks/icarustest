<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Icarus MUN 2026 | Team</title>
    
    <link rel="icon" type="image/png" href="assets/icarus.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { gold: '#D4AF37' } } }
        }
    </script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;600;700&display=swap');
        
        html, body { margin: 0; padding: 0; width: 100%; height: auto; }
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease, color 0.3s ease; -webkit-tap-highlight-color: transparent; }
        
        .font-serif { font-family: 'Playfair Display', serif; }
        .font-mono { font-family: monospace; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        html.dark ::-webkit-scrollbar-thumb { background: #334155; }

        html.dark body { background-color: #020617; color: #f8fafc; }
        html.light body { background-color: #f8fafc; color: #1e293b; }

        body.modal-open { overflow: hidden !important; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const teamMembers = [
            { name: "Orkun Güleç", role: "Secretary General", insta: "orkun12960", img: "assets/orkun_gulec.png" },
            { name: "Deniz Ela Şen", role: "Head of Press", insta: "denizelasnn", img: "assets/deniz_ela_sen.png" },
            { name: "Hilal Aylin Kayran", role: "Head of Security", insta: "Hilalayln", img: "assets/hilal_aylin_kayran.png" },
            { name: "Zemure Rouzı", role: "Head of Academy", insta: "zemure.w", img: "assets/zemure_rouzi.png" },
            { name: "Sare Nisan Danışmaz", role: "Head of IT", insta: "sarenisan", img: "assets/sare_nisan_danismaz.png" },
            { name: "Asude Baran", role: "Co-Head of PR", insta: "s.asudebaran", img: "assets/asude_baran.png" },
            { name: "Zeynep Lale Turgay", role: "Co-Head of PR", insta: "zzeyneplale", img: "assets/zeynep_lale_turgay.png" },
            { name: "Evin Aşam", role: "Co-Head of Logistics", insta: "evinasam_", img: "assets/evin_asam.png" },
            { name: "Şevval Aşam", role: "Co-Head of Logistics", insta: "", img: "assets/sevval_asam.png" },
            { name: "Muhammet Ali Bolu", role: "Observer", insta: "_slmbnmamii", img: "assets/muhammet_ali_bolu.png" }
        ];

        const Navbar = ({ onOpenApply }) => (
            <nav className="fixed top-0 inset-x-0 z-40 bg-white/95 dark:bg-slate-950/95 border-b border-slate-200 dark:border-slate-800">
                <div className="flex items-center justify-between h-16 md:h-20 max-w-7xl mx-auto px-6">
                    <a href="/" className="flex items-center gap-3">
                        <img src="assets/icarusarkaplansiz.png" alt="Logo" className="h-8 md:h-10" onError={(e) => { e.target.src='assets/icarus.png'; }} />
                        <div className="flex flex-col">
                            <span className="text-sm md:text-base font-bold font-serif text-gold tracking-widest">ICARUS</span>
                            <span className="text-[8px] font-mono text-slate-500 tracking-widest uppercase">MUN 2026</span>
                        </div>
                    </a>
                    
                    <div className="flex gap-4 sm:gap-8 items-center">
                        <a href="/" className="hidden sm:block text-xs uppercase tracking-widest font-medium text-slate-500 hover:text-gold transition-colors">Home</a>
                        <span className="hidden sm:block text-xs uppercase tracking-widest font-bold text-gold">Team</span>
                        <a href="/sponsors" className="text-xs uppercase tracking-widest font-medium text-slate-500 hover:text-gold transition-colors">Sponsors</a>
                        <button onClick={onOpenApply} className="text-xs uppercase tracking-widest font-medium text-slate-500 hover:text-gold transition-colors">Apply</button>
                    </div>
                </div>
            </nav>
        );

        const TeamCard = ({ member }) => (
            <div className="flex items-center gap-5 p-5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg">
                <div className="w-16 h-16 shrink-0 rounded-full bg-slate-100 dark:bg-slate-800 overflow-hidden">
                    <img 
                        src={member.img} 
                        alt={member.name} 
                        className="w-full h-full object-cover" 
                        onError={(e) => { e.target.src='assets/icarusarkaplansiz.png'; e.target.classList.add('object-contain', 'p-2'); }} 
                    />
                </div>
                
                <div className="flex flex-col flex-1">
                    <h3 className="text-lg font-serif font-bold text-slate-900 dark:text-white">{member.name}</h3>
                    <span className="text-[10px] font-mono text-gold uppercase tracking-widest mt-1">{member.role}</span>
                </div>

                {member.insta && (
                    <a 
                        href={`https://instagram.com/${member.insta}`} 
                        target="_blank" 
                        rel="noopener noreferrer" 
                        className="text-slate-400 hover:text-gold transition-colors p-2"
                        title="View Profile"
                    >
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                            <rect width="20" height="20" x="2" y="2" rx="5" ry="5"></rect>
                            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                            <line x1="17.5" x2="17.51" y1="6.5" y2="6.5"></line>
                        </svg>
                    </a>
                )}
            </div>
        );

        const ApplyModal = ({ isOpen, onClose }) => {
            useEffect(() => {
                document.body.classList.toggle('modal-open', isOpen);
                return () => document.body.classList.remove('modal-open');
            }, [isOpen]);

            if (!isOpen) return null;

            return ReactDOM.createPortal(
                <div className="fixed inset-0 z-[99999] flex items-center justify-center px-4 bg-slate-950/80 backdrop-blur-sm" style={{ animation: 'fadeIn 0.3s ease-out forwards' }}>
                    <div className="absolute inset-0 cursor-pointer" onClick={onClose} />
                    <div className="relative z-10 w-full max-w-5xl bg-white dark:bg-slate-950 border border-gold/40 rounded-xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
                        <div className="flex items-center justify-between p-6 border-b border-gold/20 bg-slate-50/90 dark:bg-slate-900/90 backdrop-blur-md">
                            <h2 className="text-2xl md:text-3xl font-serif text-slate-900 dark:text-white">Application Options</h2>
                            <button onClick={onClose} className="p-2 rounded-full bg-slate-200/50 dark:bg-slate-800/50 text-slate-500 hover:text-gold transition-colors">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6 6 18" /><path d="m6 6 12 12" /></svg>
                            </button>
                        </div>
                        
                        <div className="p-6 md:p-10 overflow-y-auto">
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                <div className="flex flex-col items-center p-8 border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/50 hover:border-gold/50 transition-colors rounded-lg group text-center">
                                    <img src="assets/icarus_delegeler.png" alt="Individual Application" className="h-20 w-auto object-contain mb-6 group-hover:scale-110 transition-transform" onError={(e) => { e.target.style.display='none'; }} />
                                    <h3 className="text-xl font-serif text-slate-900 dark:text-white mb-2">Individual Application</h3>
                                    <p className="text-lg font-mono text-gold mb-6">600 TL</p>
                                    <div className="flex-1" />
                                    <button className="w-full py-3 text-xs tracking-widest font-mono text-white bg-gold hover:bg-gold/80 transition-colors rounded">APPLY</button>
                                </div>

                                <div className="flex flex-col items-center p-8 border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/50 hover:border-gold/50 transition-colors rounded-lg group text-center">
                                    <img src="assets/icarus_delegasyon.png" alt="Delegation Application" className="h-20 w-auto object-contain mb-6 group-hover:scale-110 transition-transform" onError={(e) => { e.target.style.display='none'; }} />
                                    <h3 className="text-xl font-serif text-slate-900 dark:text-white mb-2">Delegation Application</h3>
                                    <p className="text-lg font-mono text-gold mb-2">550 TL (Per Person)</p>
                                    <p className="text-[10px] text-slate-500 mb-6 px-2">A minimum of 5 people is required for delegation.</p>
                                    <div className="flex-1" />
                                    <button className="w-full py-3 text-xs tracking-widest font-mono text-white bg-gold hover:bg-gold/80 transition-colors rounded">APPLY</button>
                                </div>

                                <div className="flex flex-col items-center p-8 border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/50 hover:border-slate-400 dark:hover:border-slate-500 transition-colors rounded-lg group text-center">
                                    <img src="assets/icarus_ziyaretci.png" alt="Visitor" className="h-20 w-auto object-contain mb-6 group-hover:scale-110 transition-transform opacity-85 group-hover:opacity-100" onError={(e) => { e.target.style.display='none'; }} />
                                    <h3 className="text-xl font-serif text-slate-900 dark:text-white mb-2">Visitor</h3>
                                    <p className="text-lg font-mono text-slate-500 dark:text-slate-400 mb-6">300 TL</p>
                                    <div className="flex-1" />
                                    <button className="w-full py-3 text-xs tracking-widest font-mono text-slate-700 dark:text-slate-200 border border-slate-300 dark:border-slate-700 hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors rounded">APPLY</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>,
                document.body
            );
        };

        const MainApp = () => {
            const [dark, setDark] = useState(false);
            const [isApplyOpen, setIsApplyOpen] = useState(false);

            useEffect(() => {
                document.documentElement.classList.toggle('dark', dark);
                document.documentElement.classList.toggle('light', !dark);
            }, [dark]);

            return (
                <div className="min-h-screen flex flex-col">
                    <Navbar onOpenApply={() => setIsApplyOpen(true)} />

                    <main className="flex-1 max-w-5xl mx-auto w-full px-6 pt-32 pb-20">
                        <div className="text-center mb-16">
                            <h1 className="text-3xl md:text-4xl font-serif text-slate-900 dark:text-white">The Faces Behind ICARUS</h1>
                            <div className="w-12 h-[1px] bg-gold mx-auto mt-6" />
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            {teamMembers.map((member, idx) => (
                                <TeamCard key={idx} member={member} />
                            ))}
                        </div>
                    </main>

                    <footer className="py-10 flex flex-col justify-center items-center gap-5 bg-white dark:bg-slate-950 border-t border-slate-200 dark:border-slate-800">
                        <img src="assets/imzatalhaozturk.png" alt="Signature" className="h-24 sm:h-32 md:h-40 w-auto object-contain opacity-80 hover:opacity-100 transition-opacity drop-shadow-sm" onError={(e) => { e.target.style.display='none'; }} />
                        <p className="text-[10px] md:text-xs font-mono text-slate-500 tracking-widest uppercase">
                            © 2026 IcarusMUN. All rights reserved.
                        </p>
                    </footer>

                    <button 
                        onClick={() => setDark(!dark)} 
                        className="fixed bottom-6 right-6 p-3 rounded-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-500 dark:text-slate-400 shadow-sm hover:text-gold dark:hover:text-gold transition-colors z-50"
                    >
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                            {dark ? (
                                <circle cx="12" cy="12" r="5" />
                            ) : (
                                <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
                            )}
                        </svg>
                    </button>
                    
                    <ApplyModal isOpen={isApplyOpen} onClose={() => setIsApplyOpen(false)} />
                </div>
            );
        };

        const rootNode = document.getElementById('root');
        ReactDOM.createRoot(rootNode).render(<MainApp />);
    </script>
</body>
</html>
