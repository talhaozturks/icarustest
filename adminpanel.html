<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Icarus MUN 2026 | Admin Panel</title>
    
    <link rel="icon" type="image/png" href="assets/icarus.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { gold: '#D4AF37' } } }
        }
    </script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Caveat:wght@500;700&display=swap');
        
        html, body {
            margin: 0; padding: 0; width: 100%; height: auto;
        }

        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 0.5s ease, color 0.5s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .font-serif { font-family: 'Playfair Display', serif; }
        .font-signature { font-family: 'Caveat', cursive; }

        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        html.dark body { background-color: #020617; color: #f8fafc; }
        html.light body { background-color: #f8fafc; color: #1e293b; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const AdminPanel = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [username, setUsername] = useState("");
            const [password, setPassword] = useState("");
            const [error, setError] = useState("");

            // Form States
            const [uploader, setUploader] = useState("");
            const [file, setFile] = useState(null);
            const [description, setDescription] = useState("");
            const [successMsg, setSuccessMsg] = useState("");
            const [dark, setDark] = useState(false);

            useEffect(() => {
                document.documentElement.classList.toggle('dark', dark);
                document.documentElement.classList.toggle('light', !dark);
            }, [dark]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (username === "talha" && password === "icarusmun2026!") {
                    setIsLoggedIn(true);
                    setError("");
                } else {
                    setError("Hatalı kullanıcı adı veya şifre!");
                }
            };

            const handleUpload = (e) => {
                e.preventDefault();
                if (!uploader || !file || !description) {
                    setError("Lütfen tüm alanları doldurun.");
                    return;
                }
                
                // BACKEND ENTEGRASYONU BURAYA GELECEK
                console.log("Yüklenecek Veriler:", { uploader, file: file.name, description });
                
                setSuccessMsg("Fotoğraf başarıyla eklendi! (Mock-up)");
                setError("");
                setUploader("");
                setFile(null);
                setDescription("");
                e.target.reset();

                setTimeout(() => setSuccessMsg(""), 3000);
            };

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 bg-[url('assets/icarusyuklenme2.png')] bg-cover bg-center relative">
                        <div className="absolute inset-0 bg-slate-50/90 dark:bg-slate-950/90 backdrop-blur-sm z-0"></div>
                        <div className="relative z-10 w-full max-w-md p-8 bg-white dark:bg-slate-900 border border-gold/40 rounded-xl shadow-2xl fade-in flex flex-col items-center">
                            <img src="assets/icarusarkaplansiz.png" alt="Logo" className="h-16 mb-2" onError={(e) => { e.target.style.display='none'; }} />
                            <h2 className="text-2xl font-serif text-gold mb-6 tracking-widest uppercase">Admin Girişi</h2>
                            
                            {error && <div className="w-full p-3 mb-4 text-sm text-red-500 bg-red-100/10 border border-red-500/50 rounded">{error}</div>}
                            
                            <form onSubmit={handleLogin} className="w-full flex flex-col gap-4">
                                <input 
                                    type="text" 
                                    placeholder="Kullanıcı Adı" 
                                    value={username}
                                    onChange={(e) => setUsername(e.target.value)}
                                    className="w-full p-3 bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-800 rounded outline-none focus:border-gold transition-colors"
                                />
                                <input 
                                    type="password" 
                                    placeholder="Şifre" 
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    className="w-full p-3 bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-800 rounded outline-none focus:border-gold transition-colors"
                                />
                                <button type="submit" className="w-full py-3 mt-2 text-xs tracking-widest font-mono text-white bg-gold hover:bg-gold/80 transition-colors rounded uppercase">
                                    Giriş Yap
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col items-center fade-in bg-slate-50 dark:bg-slate-950">
                    <nav className="w-full fixed top-0 z-40 bg-white/95 dark:bg-slate-950/95 backdrop-blur border-b border-gold/20">
                        <div className="flex items-center justify-between h-20 max-w-7xl mx-auto px-6">
                            <div className="flex items-center gap-3">
                                <img src="assets/icarusarkaplansiz.png" alt="Logo" className="h-10" onError={(e) => { e.target.style.display='none'; }} />
                                <div className="flex flex-col">
                                    <span className="text-lg font-bold font-serif text-gold tracking-widest">ICARUS</span>
                                    <span className="text-[10px] font-mono text-slate-500 tracking-widest">ADMIN PANEL</span>
                                </div>
                            </div>
                            <button onClick={() => setIsLoggedIn(false)} className="text-xs uppercase tracking-widest text-slate-500 hover:text-red-500 transition-colors font-mono">
                                Çıkış Yap
                            </button>
                        </div>
                    </nav>

                    <main className="w-full max-w-2xl mt-32 mb-16 px-6 flex-1">
                        <div className="text-center mb-10">
                            <h1 className="text-3xl md:text-4xl font-serif text-slate-900 dark:text-white">Galeri Yönetimi</h1>
                            <div className="w-16 h-[1px] bg-gold mx-auto mt-4" />
                        </div>

                        <div className="p-8 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl shadow-sm hover:border-gold/50 transition-colors">
                            {error && <div className="w-full p-3 mb-6 text-sm text-red-500 bg-red-100/10 border border-red-500/50 rounded">{error}</div>}
                            {successMsg && <div className="w-full p-3 mb-6 text-sm text-green-500 bg-green-100/10 border border-green-500/50 rounded">{successMsg}</div>}

                            <form onSubmit={handleUpload} className="flex flex-col gap-6">
                                <div className="flex flex-col gap-2">
                                    <label className="text-xs font-mono tracking-widest text-slate-500 uppercase">Yükleyen Kişi :</label>
                                    <input 
                                        type="text" 
                                        value={uploader}
                                        onChange={(e) => setUploader(e.target.value)}
                                        className="w-full p-3 bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-800 rounded outline-none focus:border-gold transition-colors text-sm"
                                        placeholder="Örn: Orkun Güleç"
                                    />
                                </div>

                                <div className="flex flex-col gap-2">
                                    <label className="text-xs font-mono tracking-widest text-slate-500 uppercase">Dosya :</label>
                                    <input 
                                        type="file" 
                                        accept="image/*"
                                        onChange={(e) => setFile(e.target.files[0])}
                                        className="w-full p-3 bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-800 rounded outline-none focus:border-gold transition-colors text-sm file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-xs file:font-mono file:bg-gold/10 file:text-gold hover:file:bg-gold/20 cursor-pointer"
                                    />
                                </div>

                                <div className="flex flex-col gap-2">
                                    <label className="text-xs font-mono tracking-widest text-slate-500 uppercase">Açıklama :</label>
                                    <textarea 
                                        value={description}
                                        onChange={(e) => setDescription(e.target.value)}
                                        rows="4"
                                        className="w-full p-3 bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-800 rounded outline-none focus:border-gold transition-colors text-sm resize-none"
                                        placeholder="Fotoğraf hakkında kısa bir açıklama..."
                                    ></textarea>
                                </div>

                                <button type="submit" className="w-full py-4 mt-4 text-xs tracking-widest font-mono text-white bg-gold hover:bg-gold/80 transition-colors rounded uppercase">
                                    Galeriye Ekle
                                </button>
                            </form>
                        </div>
                    </main>

                    <footer className="w-full py-10 flex flex-col justify-center items-center gap-5 border-t border-slate-200 dark:border-slate-800 mt-auto">
                        <img src="assets/imzatalhaozturk.png" alt="Signature" className="h-24 sm:h-32 md:h-40 w-auto object-contain opacity-80 hover:opacity-100 transition-opacity drop-shadow-sm" onError={(e) => { e.target.style.display='none'; }} />
                        <p className="text-[10px] md:text-xs font-mono text-slate-500 tracking-widest uppercase">© 2026 IcarusMUN. All rights reserved.</p>
                    </footer>

                    <button onClick={() => setDark(!dark)} className="fixed bottom-6 right-6 p-4 rounded-full shadow-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 z-[999]">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="text-slate-600 dark:text-gold">
                            <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
                        </svg>
                    </button>
                </div>
            );
        };

        const rootNode = document.getElementById('root');
        ReactDOM.createRoot(rootNode).render(<AdminPanel />);
    </script>
</body>
</html>
