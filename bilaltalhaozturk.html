<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f5f6f7] min-h-screen w-full flex items-center justify-center font-sans m-0 p-0 overflow-hidden">
    <div class="flex flex-col items-center justify-center w-full px-4">
        <div class="flex items-center justify-center gap-6 sm:gap-8 mb-8">
            <img src="assets/icarus.png" alt="Icarus" class="w-32 h-32 sm:w-40 sm:h-40 object-contain">
            <span class="text-3xl sm:text-4xl font-thin text-gray-800 select-none">x</span>
            <img src="assets/imzatalhaozturk2.png" alt="Talha Ozturk" class="w-32 h-32 sm:w-40 sm:h-40 object-contain">
        </div>
        <div class="mt-4">
            <h1 class="text-[#FFC107] text-lg sm:text-xl font-light text-center">
                Redirecting...
            </h1>
        </div>
    </div>
    
    <script>
        window.onload = function() {
            setTimeout(function() {
                window.location.href = "https://www.youtube.com/watch?v=yqn4Yyux7_Y";
            }, 2000);
        };
    </script>
</body>
</html>
