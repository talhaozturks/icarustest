<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>orkun?</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper-bg: #f9f7f1;
            --pen-ink: #1a1e29;
            --red-pen: rgba(200, 50, 60, 0.8);
            --scribble-pink: rgba(235, 120, 130, 0.6);
        }

        body {
            background-color: #d1d5db;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Caveat', cursive;
            overflow: hidden;
        }

        .secret-note-paper {
            background-color: var(--paper-bg);
            width: 90vw;
            max-width: 420px;
            min-height: 280px;
            position: relative;
            border-radius: 2px 255px 3px 25px / 255px 5px 225px 3px;
            box-shadow: 
                2px 5px 15px rgba(0,0,0,0.1), 
                inset 0 0 40px rgba(130, 110, 80, 0.05),
                inset -3px -2px 10px rgba(255,255,255,0.6);
            background-image: url("data:image/svg+xml,%3Csvg width='100%25' height='42' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M-5 40 Q 50 41.5 100 40 T 200 41 T 300 39 T 400 41' stroke='%234a5568' fill='none' opacity='0.2' stroke-width='1.2' stroke-linecap='round'/%3E%3C/svg%3E");
            background-size: 100% 42px;
            background-position: 0 10px;
            padding-top: 45px;
            transform: rotate(-3.5deg) scale(0.98);
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 10;
        }

        .secret-note-paper:hover {
            transform: rotate(-1.5deg) scale(1.01);
        }

        .secret-note-paper::before {
            content: '';
            position: absolute;
            top: -10px;
            bottom: -15px;
            left: 45px;
            width: 1.5px;
            background: linear-gradient(to bottom, rgba(200, 50, 60, 0), rgba(200, 50, 60, 0.4) 10%, rgba(200, 50, 60, 0.3) 90%, rgba(200, 50, 60, 0));
            z-index: 1;
            transform: rotate(1deg);
        }

        .secret-note-text {
            position: relative;
            z-index: 2;
            padding-left: 65px;
            padding-right: 15px;
            font-size: 2.6rem;
            color: var(--pen-ink);
            line-height: 42px;
            transform: rotate(2.5deg);
            user-select: none;
        }

        .w-1 { display: inline-block; transform: rotate(-3deg) translateY(3px); margin-right: 4px; }
        .w-2 { display: inline-block; transform: rotate(2deg) translateY(-2px); margin-right: 6px; font-size: 2.7rem; }
        .w-3 { display: inline-block; transform: rotate(-1deg) translateY(1px); margin-right: 2px; }

        .secret-word-box {
            display: inline-block;
            position: relative;
            cursor: pointer;
            padding: 0 5px;
            white-space: nowrap;
            transform: rotate(1.5deg) translateY(2px);
        }

        .secret-word-box .actual-text {
            opacity: 0.05;
            transition: opacity 0.8s ease, filter 0.8s ease;
            filter: blur(3px);
        }

        .secret-word-box.revealed .actual-text {
            opacity: 1;
            filter: blur(0);
        }

        .scribble-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 130%;
            height: 160%;
            z-index: 3;
            transition: opacity 0.6s ease, transform 0.7s cubic-bezier(0.6, -0.28, 0.735, 0.045);
            pointer-events: none;
        }

        .secret-word-box.revealed .scribble-overlay {
            opacity: 0;
            transform: translate(-50%, -80%) scale(1.4) rotate(15deg);
        }

        .ink-splatter {
            position: absolute;
            bottom: 25px;
            right: 35px;
            width: 45px;
            height: 45px;
            pointer-events: none;
            opacity: 0.85;
        }
    </style>
</head>
<body>

    <div class="secret-note-paper">
        <div class="secret-note-text">
            <span class="w-1">ORKUNUM</span> 
            <span class="w-2">KURDELEYE</span> 
            <span class="w-3">TIKLA</span> 
            
            <span class="secret-word-box" id="theSecretWord" onclick="revealHiddenMessage()">
                <span class="actual-text">aferin</span>
                
                <div class="scribble-overlay">
                    <svg viewBox="0 0 120 70" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
                        <path d="M 60 35 C 30 10, 15 30, 25 50 C 40 65, 55 45, 60 35 C 65 45, 80 65, 95 50 C 105 30, 90 10, 60 35 Z" fill="var(--scribble-pink)" opacity="0.6" />
                        <path d="M 58 37 C 35 15, 20 25, 28 45 C 38 55, 52 42, 58 37 C 68 48, 82 58, 92 45 C 100 25, 85 15, 58 37 Z" fill="var(--scribble-pink)" opacity="0.8" />
                        
                        <path d="M 60 35 C 35 5, 5 20, 20 55 C 35 70, 50 40, 60 35 C 70 40, 85 70, 100 55 C 115 20, 85 5, 60 35 Z" stroke="var(--red-pen)" stroke-width="1.5" fill="none" opacity="0.7"/>
                        <path d="M 58 33 C 32 8, 8 25, 22 52 C 32 65, 52 42, 58 33 C 65 42, 82 65, 98 52 C 110 25, 88 8, 58 33 Z" stroke="var(--red-pen)" stroke-width="1" fill="none" opacity="0.9"/>
                        <path d="M 62 37 C 38 12, 12 28, 18 48 C 38 68, 48 38, 62 37 C 72 38, 88 68, 96 48 C 108 28, 82 12, 62 37 Z" stroke="var(--red-pen)" stroke-width="0.8" fill="none" opacity="0.6"/>
                        
                        <path d="M 50 40 L 20 65 Q 15 65 18 55 L 45 35" stroke="var(--red-pen)" stroke-width="1.5" fill="var(--scribble-pink)" opacity="0.7"/>
                        <path d="M 48 42 L 22 62 Q 18 68 15 58 L 42 38" stroke="var(--red-pen)" stroke-width="1" fill="none" opacity="0.9"/>
                        
                        <path d="M 70 40 L 100 65 Q 105 65 102 55 L 75 35" stroke="var(--red-pen)" stroke-width="1.5" fill="var(--scribble-pink)" opacity="0.7"/>
                        <path d="M 72 42 L 98 62 Q 102 68 105 58 L 78 38" stroke="var(--red-pen)" stroke-width="1" fill="none" opacity="0.9"/>
                        
                        <circle cx="60" cy="35" r="7" fill="var(--scribble-pink)" stroke="var(--red-pen)" stroke-width="1.5"/>
                        <circle cx="59" cy="34" r="5" fill="none" stroke="var(--red-pen)" stroke-width="1"/>
                        <path d="M 55 35 Q 60 30 65 38" stroke="var(--red-pen)" stroke-width="1" fill="none"/>
                    </svg>
                </div>
            </span>
        </div>
        
        <div class="ink-splatter">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <path d="M45,20 C60,10 80,30 75,50 C70,70 55,80 35,75 C15,70 10,50 20,35 C30,20 35,25 45,20 Z" fill="var(--pen-ink)" opacity="0.7" filter="blur(0.5px)"/>
                <circle cx="85" cy="15" r="3" fill="var(--pen-ink)" opacity="0.6"/>
                <circle cx="90" cy="25" r="1.5" fill="var(--pen-ink)" opacity="0.5"/>
                <circle cx="15" cy="80" r="4" fill="var(--pen-ink)" opacity="0.8"/>
                <circle cx="25" cy="90" r="2" fill="var(--pen-ink)" opacity="0.4"/>
                <circle cx="10" cy="40" r="2.5" fill="var(--pen-ink)" opacity="0.6"/>
            </svg>
        </div>
    </div>

    <script>
        function revealHiddenMessage() {
            const secretBox = document.getElementById('theSecretWord');
            if (!secretBox.classList.contains('revealed')) {
                secretBox.classList.add('revealed');
            }
        }
    </script>
</body>
</html>
