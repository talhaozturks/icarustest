<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Icarus MUN 2026 | Sponsors</title>
    
    <link rel="icon" type="image/png" href="assets/icarus.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { gold: '#D4AF37' } } }
        }
    </script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Caveat:wght@500;700&display=swap');

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: auto;
        }

        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 0.5s ease, color 0.5s ease;
            -webkit-tap-highlight-color: transparent;
        }

        body.modal-open {
            overflow: hidden !important;
        }

        .font-serif {
            font-family: 'Playfair Display', serif;
        }

        .line-draw { position: relative; }
        .line-draw::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0%;
            height: 1px;
            background-color: #D4AF37;
            transition: width 0.3s ease-in-out;
        }
        .line-draw:hover::after { width: 100%; }

        .fade-in { animation: fadeIn 0.4s ease-out forwards; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 4px; }

        html.dark body { background-color: #020617; color: #f8fafc; }
        html.light body { background-color: #f8fafc; color: #1e293b; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const localeData = {
            en: {
                nav: { home: 'Home', about: 'About Us', team: 'Team', sponsors: 'Sponsors', gallery: 'Gallery', apply: 'Apply' },
                footer: "© 2026 IcarusMUN. All rights reserved.",
                sponsorsTitle: "OUR PARTNERS",
                sponsorsDesc: "Sponsors will be added soon.",
                contactTitle: "Contact Us",
                contactEmail: "EMAIL",
                contactBtn: "SEND EMAIL",
                applyModalTitle: "Application Options",
                indivApply: "Individual Application",
                delegApply: "Delegation Application",
                visApply: "Visitor",
                indivPrice: "1250 TL",
                delegPrice: "1200 TL (Per Person)",
                visPrice: "Currently Closed",
                delegNote: "A minimum of 4 people is required for delegation.",
                applyBtn: "APPLY",
                closedBtn: "UNAVAILABLE"
            }
        };

        const ContactModal = ({ isOpen, onClose, data }) => {
            useEffect(() => {
                document.body.classList.toggle('modal-open', isOpen);
                return () => document.body.classList.remove('modal-open');
            }, [isOpen]);

            if (!isOpen) return null;

            const mailSubject = "IcarusMUN Bilgi Talebi";
            const mailBody = "Hello, I would like to get information about...";
            const mailtoLink = `mailto:icarusmun.information@gmail.com?subject=${encodeURIComponent(mailSubject)}&body=${encodeURIComponent(mailBody)}`;

            return ReactDOM.createPortal(
                <div className="fixed inset-0 z-[99999] flex items-center justify-center px-4 fade-in bg-slate-950/80 backdrop-blur-sm">
                    <div className="absolute inset-0 cursor-pointer" onClick={onClose} />
                    <div className="relative z-10 flex flex-col items-center w-full max-w-md p-8 sm:p-12 overflow-hidden shadow-2xl bg-white dark:bg-slate-950 border border-gold/40 rounded-xl">
                        <button onClick={onClose} className="absolute top-4 right-4 p-2 rounded-full bg-slate-100/50 dark:bg-slate-900/50 text-slate-500 hover:text-gold transition-colors">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6 6 18" /><path d="m6 6 12 12" /></svg>
                        </button>
                        
                        <div className="p-4 mb-4 rounded-full shadow-lg text-gold bg-slate-50 dark:bg-slate-900 border border-gold/30">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                        </div>
                        
                        <h2 className="mb-4 text-2xl sm:text-3xl font-serif text-slate-900 dark:text-white text-center">{data.contactTitle}</h2>
                        <div className="w-16 h-[1px] bg-gold mb-6" />
                        <p className="mb-2 text-xs tracking-widest font-mono text-slate-500 dark:text-slate-400">{data.contactEmail}</p>
                        <p className="mb-8 text-sm sm:text-base font-semibold text-slate-800 dark:text-slate-200 break-all">icarusmun.information@gmail.com</p>

                        <a href={mailtoLink} className="w-full text-center px-6 py-4 text-xs tracking-widest transition-all duration-300 shadow-sm sm:text-sm font-mono border text-gold border-gold bg-gold/10 hover:bg-gold hover:text-white dark:hover:text-slate-950">
                            {data.contactBtn}
                        </a>
                    </div>
                </div>,
                document.body
            );
        };

        const ApplyModal = ({ isOpen, onClose, t }) => {
            useEffect(() => {
                document.body.classList.toggle('modal-open', isOpen);
                return () => document.body.classList.remove('modal-open');
            }, [isOpen]);

            if (!isOpen) return null;

            return ReactDOM.createPortal(
                <div className="fixed inset-0 z-[99999] flex items-center justify-center px-4 fade-in bg-slate-950/80 backdrop-blur-sm">
                    <div className="absolute inset-0 cursor-pointer" onClick={onClose} />
                    <div className="relative z-10 w-full max-w-5xl bg-white dark:bg-slate-950 border border-gold/40 rounded-xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
                        <div className="flex items-center justify-between p-6 border-b border-gold/20 bg-slate-50/90 dark:bg-slate-900/90 backdrop-blur-md">
                            <h2 className="text-2xl md:text-3xl font-serif text-slate-900 dark:text-white">{t.applyModalTitle}</h2>
                            <button onClick={onClose} className="p-2 rounded-full bg-slate-200/50 dark:bg-slate-800/50 text-slate-500 hover:text-gold transition-colors">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6 6 18" /><path d="m6 6 12 12" /></svg>
                            </button>
                        </div>
                        
                        <div className="p-6 md:p-10 overflow-y-auto">
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                
                                <div className="flex flex-col items-center p-8 border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/50 hover:border-gold/50 transition-colors rounded-lg group text-center">
                                    <img src="assets/icarus_delegeler.png" alt={t.indivApply} className="h-20 w-auto object-contain mb-6 group-hover:scale-110 transition-transform" onError={(e) => { e.target.style.display='none'; }} />
                                    <h3 className="text-xl font-serif text-slate-900 dark:text-white mb-2">{t.indivApply}</h3>
                                    <p className="text-lg font-mono text-gold mb-6">{t.indivPrice}</p>
                                    <div className="flex-1" />
                                    <a href="https://forms.gle/v9DdMy8icZ1J1XTj8" target="_blank" rel="noopener noreferrer" className="block w-full py-3 text-center text-xs tracking-widest font-mono text-white bg-gold hover:bg-gold/80 transition-colors rounded">{t.applyBtn}</a>
                                </div>

                                <div className="flex flex-col items-center p-8 border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/50 hover:border-gold/50 transition-colors rounded-lg group text-center">
                                    <img src="assets/icarus_delegasyon.png" alt={t.delegApply} className="h-20 w-auto object-contain mb-6 group-hover:scale-110 transition-transform" onError={(e) => { e.target.style.display='none'; }} />
                                    <h3 className="text-xl font-serif text-slate-900 dark:text-white mb-2">{t.delegApply}</h3>
                                    <p className="text-lg font-mono text-gold mb-2">{t.delegPrice}</p>
                                    <p className="text-[10px] text-slate-500 mb-6 px-2">{t.delegNote}</p>
                                    <div className="flex-1" />
                                    <a href="https://forms.gle/Z9sPWTLnPK39bKr69" target="_blank" rel="noopener noreferrer" className="block w-full py-3 text-center text-xs tracking-widest font-mono text-white bg-gold hover:bg-gold/80 transition-colors rounded">{t.applyBtn}</a>
                                </div>

                                <div className="flex flex-col items-center p-8 border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/50 transition-colors rounded-lg group text-center opacity-70 grayscale hover:grayscale-0">
                                    <img src="assets/icarus_ziyaretci.png" alt={t.visApply} className="h-20 w-auto object-contain mb-6" onError={(e) => { e.target.style.display='none'; }} />
                                    <h3 className="text-xl font-serif text-slate-900 dark:text-white mb-2">{t.visApply}</h3>
                                    <p className="text-lg font-mono text-slate-500 dark:text-slate-400 mb-6">{t.visPrice}</p>
                                    <div className="flex-1" />
                                    <button disabled className="w-full py-3 text-xs tracking-widest font-mono text-slate-500 dark:text-slate-400 bg-slate-200 dark:bg-slate-800 cursor-not-allowed rounded">{t.closedBtn}</button>
                                </div>

                            </div>
                        </div>
                    </div>
                </div>,
                document.body
            );
        };

        const SponsorsView = ({ t }) => (
            <div className="max-w-7xl mx-auto min-h-[90vh] pt-28 pb-16 px-6 fade-in">
                <div className="text-center mb-16">
                    <p className="text-xs font-mono text-gold tracking-[0.3em] mb-2">{t.nav.sponsors.toUpperCase()}</p>
                    <h1 className="text-4xl md:text-5xl font-serif text-slate-900 dark:text-white">{t.sponsorsTitle}</h1>
                    <div className="w-16 h-[1px] bg-gold mx-auto mt-6" />
                </div>
                
                {/* Sponsorlar eklendiğinde içeriği buraya girebilirsiniz */}
                <div className="flex justify-center text-slate-500 text-lg font-light">
                    {t.sponsorsDesc}
                </div>
            </div>
        );

        const MainApp = ({ lang }) => {
            const t = localeData[lang];
            const [menuOpen, setMenuOpen] = useState(false);
            const [isContactOpen, setIsContactOpen] = useState(false);
            const [isApplyOpen, setIsApplyOpen] = useState(false);

            return (
                <div className="relative w-full min-h-screen overflow-x-hidden transition-colors duration-500 bg-slate-50 dark:bg-slate-950">
                    <nav className="fixed top-0 inset-x-0 z-40 bg-white/95 dark:bg-slate-950/95 backdrop-blur border-b border-gold/20">
                        <div className="flex items-center justify-between h-16 md:h-20 max-w-7xl mx-auto px-4 sm:px-6">
                            <a href="index.html" className="flex items-center gap-3 cursor-pointer">
                                <img src="assets/icarusarkaplansiz.png" alt="Logo" className="h-8 md:h-12" onError={(e) => { e.target.src='assets/icarus.png'; }} />
                                <div className="flex flex-col">
                                    <span className="text-sm md:text-lg font-bold font-serif text-gold tracking-widest">ICARUS</span>
                                    <span className="text-[7px] md:text-[10px] font-mono text-slate-500 tracking-widest">MUN 2026</span>
                                </div>
                            </a>
                            
                            {/* Desktop Nav - Linkler .html dosyalarına ayarlandı */}
                            <div className="hidden md:flex gap-8 items-center">
                                <a href="index.html" className="text-sm uppercase tracking-wide transition line-draw text-slate-600 dark:text-slate-300 hover:text-gold">{t.nav.home}</a>
                                <a href="about.html" className="text-sm uppercase tracking-wide transition line-draw text-slate-600 dark:text-slate-300 hover:text-gold">{t.nav.about}</a>
                                <a href="team.html" className="text-sm uppercase tracking-wide transition line-draw text-slate-600 dark:text-slate-300 hover:text-gold">{t.nav.team}</a>
                                <a href="sponsor.html" className="text-sm uppercase tracking-wide transition line-draw text-gold font-bold">{t.nav.sponsors}</a>
                                
                                {/* Apply ve Contact Modal olarak kalmaya devam ediyor */}
                                <button onClick={() => setIsApplyOpen(true)} className="text-sm uppercase tracking-wide text-slate-600 dark:text-slate-300 hover:text-gold transition line-draw">{t.nav.apply}</button>
                                <button onClick={() => setIsContactOpen(true)} className="p-2 ml-4 rounded-full transition-colors text-slate-500 hover:text-gold dark:text-slate-400 dark:hover:text-gold border border-transparent hover:border-gold/30">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                                </button>
                            </div>

                            {/* Mobile Nav Toggle */}
                            <div className="flex items-center gap-2 md:hidden">
                                <button className="p-2 text-slate-500 hover:text-gold dark:text-slate-400 transition-colors" onClick={() => setIsContactOpen(true)}>
                                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                                </button>
                                <button className="p-2 text-gold" onClick={() => setMenuOpen(!menuOpen)}>
                                    {menuOpen ? (
                                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg>
                                    ) : (
                                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" y1="6" x2="20" y2="6" /><line x1="4" y1="12" x2="20" y2="12" /><line x1="4" y1="18" x2="20" y2="18" /></svg>
                                    )}
                                </button>
                            </div>
                        </div>
                    </nav>

                    {/* Mobile Menu */}
                    {menuOpen && (
                        <div className="fixed top-16 left-0 w-full bg-white/95 dark:bg-slate-950/95 z-30 flex flex-col p-4 border-b border-gold/20 backdrop-blur-md">
                            <a href="index.html" className="py-3 text-left font-medium text-slate-800 dark:text-slate-200">{t.nav.home}</a>
                            <a href="about.html" className="py-3 text-left font-medium text-slate-800 dark:text-slate-200">{t.nav.about}</a>
                            <a href="team.html" className="py-3 text-left font-medium text-slate-800 dark:text-slate-200">{t.nav.team}</a>
                            <a href="sponsor.html" className="py-3 text-left font-medium text-gold">{t.nav.sponsors}</a>
                            <button onClick={() => { setIsApplyOpen(true); setMenuOpen(false); }} className="py-3 text-left font-medium text-slate-800 dark:text-slate-200">{t.nav.apply}</button>
                        </div>
                    )}

                    {/* Content Section */}
                    <SponsorsView t={t} />

                    <footer className="py-10 flex flex-col justify-center items-center gap-5 bg-white dark:bg-slate-950 border-t border-slate-200 dark:border-slate-800">
                        <img src="assets/imzatalhaozturk.png" alt="Signature" className="h-24 sm:h-32 md:h-40 w-auto object-contain opacity-80 hover:opacity-100 transition-opacity drop-shadow-sm" onError={(e) => { e.target.style.display='none'; }} />
                        <p className="text-[10px] md:text-xs font-mono text-slate-500 tracking-widest uppercase">{t.footer}</p>
                    </footer>

                    <ContactModal isOpen={isContactOpen} onClose={() => setIsContactOpen(false)} data={t} />
                    <ApplyModal isOpen={isApplyOpen} onClose={() => setIsApplyOpen(false)} t={t} />
                </div>
            );
        };

        const MainRoot = () => {
            const [dark, setDark] = useState(false);

            useEffect(() => {
                document.documentElement.classList.toggle('dark', dark);
                document.documentElement.classList.toggle('light', !dark);
            }, [dark]);

            return (
                <>
                    <MainApp lang="en" />
                    
                    {/* Dark Mode Toggle */}
                    <button onClick={() => setDark(!dark)} className="fixed bottom-6 right-6 p-4 rounded-full shadow-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 z-[999]">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="text-slate-600 dark:text-gold">
                            <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
                        </svg>
                    </button>
                </>
            );
        };

        const rootNode = document.getElementById('root');
        ReactDOM.createRoot(rootNode).render(<MainRoot />);
    </script>
</body>
</html>
